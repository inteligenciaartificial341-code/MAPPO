  closeModal();
  const painel=document.getElementById('vrfPainel');
  if(vrfFloorTab>0)painel.innerHTML=vrfRenderAndarPainel(vrfObra.andares[vrfFloorTab-1]);
  toast('Foto excluída');
}

/* ─── VIEW: mapa da obra VRF (check-ins do prestador) ─── */
let vrfMapaInstance=null;
function renderVRFmapa(){
  const hoje=new Date().toISOString().split('T')[0];
  const checkinsHoje=vrfCheckins.filter(c=>c.data===hoje);
  const comGPS=checkinsHoje.filter(c=>c.lat);
  return `<div class="page-head"><div><div class="page-title">Mapa da Obra</div><div class="page-desc">Check-ins e localização do prestador</div></div></div>
  <div class="card" style="padding:0;overflow:hidden">
    <div id="vrfMapaBox" style="width:100%;height:340px;background:var(--gray-100)"></div>
  </div>
  <div class="vrf-section-label" style="margin-top:18px">Check-ins de hoje (${fmtDate(hoje)})</div>
  <div class="card">
    ${checkinsHoje.length?checkinsHoje.slice().reverse().map(c=>`
      <div class="vrf-checkin-item">
        <div class="vrf-ci-badge">${svgIco('mapa','ico-sm')}</div>
        <div class="vrf-ci-item-info">
          <strong>${c.prestador}</strong>
          <span>Check-in às ${c.hora}${c.lat?' · 📍 com localização':' · sem GPS'}</span>
        </div>
        ${c.lat?`<button class="btn btn-ghost btn-sm" onclick="vrfCentralizarMapa(${c.lat},${c.lng})">Ver no mapa</button>`:''}
      </div>`).join(''):emptyState('mapa','Nenhum check-in hoje','Quando o prestador fizer o check-in do dia na obra, a localização aparece aqui.')}
  </div>`;
}
function initVRFmapa(){
  if(typeof L==='undefined'){loadLeaflet(()=>{if(typeof L!=='undefined')initVRFmapa();});return;}
  const box=document.getElementById('vrfMapaBox');if(!box)return;
  box.innerHTML='';
  if(vrfMapaInstance){try{vrfMapaInstance.remove();}catch(e){}vrfMapaInstance=null;}
  vrfMapaInstance=L.map('vrfMapaBox').setView([-17.302,-48.283],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(vrfMapaInstance);
  // marcadores dos check-ins de hoje
  const hoje=new Date().toISOString().split('T')[0];
  const pontos=[];
  vrfCheckins.filter(c=>c.data===hoje&&c.lat).forEach(c=>{
    pontos.push([c.lat,c.lng]);
    const ico=L.divIcon({html:`<div style="background:var(--gold-dark);color:#fff;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff">🏗️ ${c.prestador.split(' ')[0]}</div>`,className:'',iconSize:[90,24]});
    L.marker([c.lat,c.lng],{icon:ico}).addTo(vrfMapaInstance).bindPopup(`<b>${c.prestador}</b><br>Check-in: ${c.hora}<br>${fmtDate(c.data)}`);
  });
  // também mostra posição ao vivo (watchPosition alimenta mappo_locations)
  const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
  Object.keys(locs).forEach(t=>{
    const l=locs[t];
    if(l&&Date.now()-l.ts<300000){
      pontos.push([l.lat,l.lng]);
      const ico=L.divIcon({html:`<div style="background:var(--petrol);color:#fff;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff">📍 ${t.split(' ')[0]}</div>`,className:'',iconSize:[80,24]});
      L.marker([l.lat,l.lng],{icon:ico}).addTo(vrfMapaInstance).bindPopup(`<b>${t}</b><br>Ao vivo · ${new Date(l.ts).toLocaleTimeString('pt-BR')}`);
    }
  });
  if(pontos.length)vrfMapaInstance.fitBounds(pontos,{padding:[50,50],maxZoom:16});
  setTimeout(()=>vrfMapaInstance.invalidateSize(),200);
}
function vrfCentralizarMapa(lat,lng){
  if(vrfMapaInstance){vrfMapaInstance.setView([lat,lng],17);document.getElementById('vrfMapaBox').scrollIntoView({behavior:'smooth',block:'center'});}
}

/* ─── VIEW: galeria de fotos da obra VRF ─── */
function renderVRFfotos(){
  // coletar todas as fotos de todos os andares
  const todas=[];
  vrfObra.andares.forEach(an=>{
    const fotos=vrfFotos[an.id]||{};
    const notas=vrfNotas[an.id]||{};
    Object.keys(fotos).forEach(key=>{
      const [fid,ei]=key.split('_');
      const fase=VRF_FASES.find(f=>f.id===fid);
      (fotos[key]||[]).forEach((src,idx)=>{
        todas.push({src,andar:an.nome,andarId:an.id,key,idx,fase:fase?fase.nome:'',etapa:fase?fase.etapas[+ei]:'',nota:notas[key]||'',prestador:vrfFotoPrestador(an.id,key,idx)});
      });
    });
  });
  if(!todas.length){
    return `<div class="page-head"><div><div class="page-title">Fotos da Obra</div><div class="page-desc">Registro fotográfico do campo</div></div></div>
    <div class="card">${emptyState('camera','Nenhuma foto ainda','Quando o prestador registrar fotos das etapas no campo, todas aparecem aqui organizadas por andar e tarefa.')}</div>`;
  }
  // agrupar por andar
  const porAndar={};
  todas.forEach(f=>{if(!porAndar[f.andar])porAndar[f.andar]=[];porAndar[f.andar].push(f);});
  return `<div class="page-head"><div><div class="page-title">Fotos da Obra</div><div class="page-desc">${todas.length} foto${todas.length!==1?'s':''} · toque para ampliar</div></div></div>
  ${Object.keys(porAndar).map(andar=>`
    <div class="vrf-section-label">${andar} · ${porAndar[andar].length} foto${porAndar[andar].length!==1?'s':''}</div>
    <div class="vrf-fotos-grid">
      ${porAndar[andar].map(f=>`
        <div class="vrf-foto-card" onclick="vrfVerFotoDetalhe('${f.andarId}','${f.key}',${f.idx})">
          <img src="${f.src}" loading="lazy">
          <div class="vrf-foto-cap">
            ${f.prestador?`<div class="vrf-foto-prest">${svgIco('clientes','ico-sm')} ${f.prestador}</div>`:''}
            <div class="vrf-foto-etapa">${f.etapa||'—'}</div>
            <div class="vrf-foto-fase">${f.fase||''}</div>
            ${f.nota?`<div class="vrf-foto-nota">${svgIco('edit','ico-sm')} ${f.nota}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`).join('')}`;
}
function vrfVerFotoDetalhe(andarId,key,idx){
  const fs=(vrfFotos[andarId]||{})[key]||[];

  const an=vrfObra.andares.find(a=>a.id===andarId);

  const prestador=vrfFotoPrestador(andarId,key,idx);
  showModal(`
    <div class="modal-body" style="padding:0">
      <img src="${src}" style="width:100%;border-radius:12px 12px 0 0;display:block">
      <div style="padding:16px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--petrol);margin-bottom:4px">${an?an.nome:''}</div>
        <div style="font-size:15px;font-weight:600;color:var(--gray-800)">${fase?fase.etapas[+ei]:''}</div>
        <div style="font-size:12.5px;color:var(--gray-500);margin-top:2px">${fase?fase.nome:''}</div>
        ${prestador?`<div style="font-size:12.5px;color:var(--gray-600);margin-top:8px;display:flex;align-items:center;gap:6px">${svgIco('clientes','ico-sm')} Registrada por <strong>${prestador}</strong></div>`:''}
        ${nota?`<div style="margin-top:10px;padding:10px;background:var(--gray-50);border-radius:8px;font-size:13px;color:var(--gray-600);font-style:italic">${svgIco('edit','ico-sm')} ${nota}</div>`:''}
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Fechar</button></div>`,'wide');
}

      const keys=vrfMissaoAndar(an.id);

function vrfAddAndar(){
  vrfObra.andares.push({id:'a'+Date.now(),nome:'Andar '+(vrfObra.andares.length+1)});
  saveVrfObra();vrfConfigObra();
}
function vrfRemoverAndar(i){
  if(vrfObra.andares.length<=1){toast('A obra precisa de ao menos 1 andar','warn');return;}
  const an=vrfObra.andares[i];
  if(!confirm('Remover "'+an.nome+'"? As marcações e fotos desse andar serão apagadas.'))return;
  delete vrfProgresso[an.id];delete vrfFotos[an.id];delete vrfNotas[an.id];
  vrfObra.andares.splice(i,1);
  saveVrfObra();saveVrfProgresso();saveVrfFotos();saveVrfNotas();
  vrfConfigObra();
}
function vrfRenomearAndar(i,nome){if(vrfObra.andares[i]){vrfObra.andares[i].nome=nome.trim()||('Andar '+(i+1));saveVrfObra();}}
function vrfSalvarObra(){
  vrfObra.nome=document.getElementById('vrfNome').value.trim();
  vrfObra.metaData=document.getElementById('vrfMeta').value;
  saveVrfObra();closeModal();renderView('vrf');toast('Obra salva');
}

let _vrfMissaoAndarIdx=0;
function vrfConfigMissao(){
  _vrfMissaoAndarIdx=0;
  const tabs=vrfObra.andares.map((an,i)=>{
    const n=vrfMissaoAndar(an.id).length;
    return `<button class="fbtn ${i===0?'active':''}" onclick="vrfMissaoTab(${i})">${an.nome}${n?` <span class="fbtn-badge">${n}</span>`:''}</button>`;
  }).join('');
  showModal(`
    <div class="modal-head"><h2>Missão da Semana</h2></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--gray-500);margin-bottom:12px">Selecione o andar e marque as etapas prioritárias dele. Cada andar tem sua própria missão.</p>
      <div class="vrf-missao-tabs" id="vrfMissaoTabs">${tabs}</div>
      <div class="vrf-missao-andar-atual" id="vrfMissaoAndarAtual"></div>
      <div id="vrfMissaoSteps"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="vrfSalvarMissao()">${svgIco('check','ico-sm')} Salvar missão</button>
    </div>`);
  vrfRenderMissaoSteps();

function vrfMissaoTab(i){
  _vrfMissaoAndarIdx=i;
  document.querySelectorAll('#vrfMissaoTabs .fbtn').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  vrfRenderMissaoSteps();
}
function vrfRenderMissaoSteps(){
  const cont=document.getElementById('vrfMissaoSteps');if(!cont)return;
  const andar=vrfObra.andares[_vrfMissaoAndarIdx];if(!andar)return;
  const lbl=document.getElementById('vrfMissaoAndarAtual');
  if(lbl)lbl.innerHTML=`${svgIco('splits','ico-sm')} Definindo missão de: <strong>${andar.nome}</strong>`;
  const missaoDoAndar=vrfMissaoAndar(andar.id);
  cont.innerHTML=VRF_FASES.map(f=>`
    <div class="vrf-mfase">
      <div class="vrf-mfase-head">${f.nome}</div>
      ${f.etapas.map((et,i)=>{
        const key=f.id+'_'+i;
        const on=missaoDoAndar.includes(key);
        return `<label class="vrf-mstep ${on?'on':''}" onclick="vrfToggleMissao('${andar.id}','${key}',this)">
          <span class="vrf-mstep-chk">${on?svgIco('check','ico-sm'):''}</span>
          <span>${et}</span>
        </label>`;
      }).join('')}
    </div>`).join('');
}
function vrfToggleMissao(andarId,key,el){
  if(!vrfObra.missao.porAndar[andarId])vrfObra.missao.porAndar[andarId]=[];
  const arr=vrfObra.missao.porAndar[andarId];
  const idx=arr.indexOf(key);
  if(idx>=0){arr.splice(idx,1);el.classList.remove('on');el.querySelector('.vrf-mstep-chk').innerHTML='';}
  else{arr.push(key);el.classList.add('on');el.querySelector('.vrf-mstep-chk').innerHTML=svgIco('check','ico-sm');}
  // atualizar badge da tab
  const tab=document.querySelectorAll('#vrfMissaoTabs .fbtn')[_vrfMissaoAndarIdx];
  if(tab){
    const n=arr.length;
    const nome=vrfObra.andares[_vrfMissaoAndarIdx].nome;
    tab.innerHTML=nome+(n?` <span class="fbtn-badge">${n}</span>`:'');
  }
}
function vrfSalvarMissao(){
  // limpar andares com missão vazia
  Object.keys(vrfObra.missao.porAndar).forEach(k=>{if(!vrfObra.missao.porAndar[k].length)delete vrfObra.missao.porAndar[k];});
  saveVrfObra();closeModal();renderView('vrf');toast('Missão da semana definida');
}

/* ─── abrir andar: ver fases, etapas, progresso, fotos ─── */
function vrfAbrirAndar(andarId){
  const an=vrfObra.andares.find(a=>a.id===andarId);if(!an)return;
  const p=vrfProgresso[andarId]||{};
  const fotos=vrfFotos[andarId]||{};
  const notas=vrfNotas[andarId]||{};
  const fasesHTML=VRF_FASES.map(f=>{
    const pctFase=vrfProgFase(andarId,f.id);
    const etapasHTML=f.etapas.map((et,i)=>{
      const key=f.id+'_'+i;
      const done=!!p[key];
      const fs=fotos[key]||[];
      const nota=notas[key]||'';
      return `<div class="vrf-etapa ${done?'done':''}">
        <div class="vrf-etapa-row" onclick="vrfToggleEtapa('${andarId}','${key}',this)">
          <span class="vrf-etapa-chk">${done?svgIco('check','ico-sm'):''}</span>
          <span class="vrf-etapa-lbl">${et}</span>
          ${fs.length?`<span class="vrf-etapa-fotos">${svgIco('camera','ico-sm')} ${fs.length}</span>`:''}
        </div>
        ${nota?`<div class="vrf-etapa-nota">${svgIco('edit','ico-sm')} ${nota}</div>`:''}
        ${fs.length?`<div class="vrf-etapa-gallery">${fs.map(src=>`<img src="${src}" onclick="openLightbox('${src}')">`).join('')}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="vrf-fase">
      <div class="vrf-fase-head">
        <span>${f.nome}</span>
        <span class="vrf-fase-pct" style="color:${vrfCorProg(pctFase)}">${pctFase}%</span>
      </div>
      <div class="vrf-fase-etapas">${etapasHTML}</div>
    </div>`;
  }).join('');
  const pct=vrfProgAndar(andarId);
  showModal(`
    <div class="modal-head"><h2>${an.nome}</h2></div>
    <div class="modal-body">
      <div class="vrf-andar-prog">
        <div class="vrf-bar" style="flex:1"><div class="vrf-bar-fill" style="width:${pct}%;background:${vrfCorProg(pct)}"></div></div>
        <span style="font-weight:700;color:${vrfCorProg(pct)}">${pct}%</span>
      </div>
      ${fasesHTML}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn btn-gold" onclick="vrfExportarPDF('${andarId}')">${svgIco('ordens','ico-sm')} Exportar PDF</button>
    </div>`,'wide');
}
function vrfToggleEtapa(andarId,key,el){
  if(!vrfProgresso[andarId])vrfProgresso[andarId]={};
  const now=!vrfProgresso[andarId][key];
  vrfProgresso[andarId][key]=now;
  if(!now)delete vrfProgresso[andarId][key];
  saveVrfProgresso();
  const item=el.closest('.vrf-etapa');
  item.classList.toggle('done',now);
  el.querySelector('.vrf-etapa-chk').innerHTML=now?svgIco('check','ico-sm'):'';
}
/* carrega jsPDF sob demanda */
function carregarJsPDF(cb){
  if(window.jspdf&&window.jspdf.jsPDF)return cb();
  const js=document.createElement('script');
  js.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  js.onload=()=>cb();
  js.onerror=()=>{toast('Não foi possível carregar o gerador de PDF. Verifique a internet.','warn');};
  document.head.appendChild(js);
}

function vrfExportarPDF(andarId){
  const andar=vrfObra.andares.find(a=>a.id===andarId);
  if(!andar){toast('Andar não encontrado','warn');return;}
  toast('Gerando PDF...');
  carregarJsPDF(()=>{
    try{gerarPDFandar(andarId);}
    catch(e){toast('Erro ao gerar PDF: '+e.message,'warn');}
  });
}

function gerarPDFandar(andarId){
  const jsPDFLib=window.jspdf.jsPDF;
  const andar=vrfObra.andares.find(a=>a.id===andarId);
  const p=vrfProgresso[andarId]||{};
  const fotos=vrfFotos[andarId]||{};
  const notas=vrfNotas[andarId]||{};
  const pct=vrfProgAndar(andarId);
  const feito=Math.round(pct/100*VRF_TOTAL_ETAPAS);

  const doc=new jsPDFLib({unit:'mm',format:'a4'});
  const W=210,M=15;let y=0;
  const semAcento=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  // cabeçalho petróleo
  doc.setFillColor(24,81,102);doc.rect(0,0,W,32,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');doc.setFontSize(20);
  doc.text('ELITE AR',M,15);
  doc.setFont('helvetica','normal');doc.setFontSize(8);
  doc.text('SOLUCOES EM ENGENHARIA TERMICA',M,21);
  doc.setFontSize(11);doc.setFont('helvetica','bold');
  doc.text('Relatorio VRF — '+semAcento(andar.nome),M,28);
  y=42;

  // info obra
  doc.setTextColor(40,40,40);doc.setFontSize(10);doc.setFont('helvetica','normal');
  if(vrfObra.nome){doc.text('Obra: '+semAcento(vrfObra.nome),M,y);y+=6;}
  doc.text('Data do relatorio: '+new Date().toLocaleDateString('pt-BR'),M,y);y+=6;
  doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.setTextColor(24,81,102);
  doc.text('Progresso: '+pct+'%  ('+feito+'/'+VRF_TOTAL_ETAPAS+' etapas)',M,y);y+=4;
  // barra
  doc.setFillColor(230,230,230);doc.rect(M,y,W-2*M,4,'F');
  doc.setFillColor(201,168,76);doc.rect(M,y,(W-2*M)*pct/100,4,'F');
  y+=12;

  // fases e etapas
  VRF_FASES.forEach((f,fi)=>{
    let ff=0;f.etapas.forEach((_,ei)=>{if(p[f.id+'_'+ei])ff++;});
    if(y>260){doc.addPage();y=20;}
    doc.setFillColor(245,243,238);doc.rect(M,y-5,W-2*M,8,'F');
    doc.setTextColor(24,81,102);doc.setFont('helvetica','bold');doc.setFontSize(10);
    doc.text('F'+(fi+1)+'. '+semAcento(f.nome)+'  ('+ff+'/'+f.etapas.length+')',M+2,y);
    y+=8;
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(60,60,60);
    f.etapas.forEach((et,ei)=>{
      if(y>275){doc.addPage();y=20;}
      const done=p[f.id+'_'+ei];
      const mark=done?'[X]':'[  ]';
      const linhas=doc.splitTextToSize(mark+' '+semAcento(et),W-2*M-4);
      doc.text(linhas,M+4,y);
      y+=linhas.length*5;
      // nota
      const nota=notas[f.id+'_'+ei];
      if(nota){
        doc.setTextColor(150,120,40);doc.setFont('helvetica','italic');
        const nl=doc.splitTextToSize('Nota: '+semAcento(nota),W-2*M-8);
        doc.text(nl,M+8,y);y+=nl.length*4.5;
        doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
      }
    });
    y+=4;
  });

  // registro fotográfico
  const fotosAndar=[];
  Object.keys(fotos).forEach(key=>{
    const [fid,ei]=key.split('_');
    const fase=VRF_FASES.find(f=>f.id===fid);
    const label=fase?(fase.nome+' — '+fase.etapas[+ei]):'';
    (fotos[key]||[]).forEach(src=>fotosAndar.push({src,label}));
  });
  if(fotosAndar.length){
    doc.addPage();y=20;
    doc.setTextColor(24,81,102);doc.setFont('helvetica','bold');doc.setFontSize(13);
    doc.text('Registro Fotografico — '+semAcento(andar.nome),M,y);y+=8;
    fotosAndar.forEach(foto=>{
      if(y>230){doc.addPage();y=20;}
      doc.setTextColor(80,80,80);doc.setFont('helvetica','normal');doc.setFontSize(8);
      const ll=doc.splitTextToSize(semAcento(foto.label),W-2*M);
      doc.text(ll,M,y);y+=ll.length*4+2;
      try{doc.addImage(foto.src,'JPEG',M,y,80,60);}catch(e){}
      y+=66;
    });
  }

  // rodapé
  const pages=doc.internal.getNumberOfPages();
  for(let pg=1;pg<=pages;pg++){
    doc.setPage(pg);
    doc.setTextColor(150,150,150);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text('Elite Ar — Solucoes em Engenharia Termica  |  Pagina '+pg+'/'+pages,M,290);
  }

  const nomeArq='Relatorio_'+andar.nome.replace(/[^a-zA-Z0-9]/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.pdf';
  doc.save(nomeArq);
  toast('PDF gerado!','success');
}

  showModal(`
    <div class="modal-head"><h2>${t?'✏️ Editar técnico':'👷 Novo técnico'}</h2></div>
    <div class="modal-body">
      <div class="fg"><label>Nome completo</label><input type="text" id="tNome" value="${t?t.nome:''}" placeholder="Nome do técnico"></div>
      <div class="fg"><label>Senha de acesso</label><input type="text" id="tSenha" value="${t?(t.senha||'1234'):''}" placeholder="Senha que ele usa no login">
      <p style="font-size:12px;color:var(--gray-400);margin-top:5px">Passe essa senha pro técnico. Só ele acessa a própria conta.</p></div>
      <div class="fg"><label>Módulos liberados</label>
        <div class="mod-grid">
          <label class="mod-card" id="modCardSplit">
            <input type="checkbox" id="tSplit" ${m.split?'checked':''} onchange="document.getElementById('modCardSplit').classList.toggle('on',this.checked)">
            <span class="mod-ico">${svgIco('splits')}</span>
            <span class="mod-name">Sistema Split</span>
            <span class="mod-tick">${svgIco('check','ico-sm')}</span>
          </label>
          <label class="mod-card" id="modCardVrf">
            <input type="checkbox" id="tVrf" ${m.vrf?'checked':''} onchange="document.getElementById('modCardVrf').classList.toggle('on',this.checked)">
            <span class="mod-ico">${svgIco('vrf')}</span>
            <span class="mod-name">Sistema VRF</span>
            <span class="mod-tick">${svgIco('check','ico-sm')}</span>
          </label>
        </div>
        <p style="font-size:12px;color:var(--gray-400);margin-top:8px">No login, o técnico só vê os módulos marcados aqui.</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarTecnico(${t?`'${t.id}'`:'null'})">${svgIco('check','ico-sm')} Salvar</button>
    </div>`);
  // estado visual inicial dos cards de módulo
  if(m.split)document.getElementById('modCardSplit').classList.add('on');
  if(m.vrf)document.getElementById('modCardVrf').classList.add('on');
}

function salvarTecnico(id){
  const nome=document.getElementById('tNome').value.trim();
  const senha=document.getElementById('tSenha').value.trim();
  const mods={split:document.getElementById('tSplit').checked,vrf:document.getElementById('tVrf').checked};
  if(!nome){toast('Informe o nome','warn');return;}
  if(!senha){toast('Defina uma senha','warn');return;}
  if(!mods.split&&!mods.vrf){toast('Libere pelo menos um módulo','warn');return;}
  if(id){
    const t=tecnicos.find(x=>x.id===id);if(!t)return;
    if(tecnicos.some(x=>x.id!==id&&x.nome.toLowerCase()===nome.toLowerCase())){toast('Já existe técnico com esse nome','warn');return;}
    const nomeAntigo=t.nome;
    t.nome=nome;t.senha=senha;t.modulos=mods;
    // renomeia em OS, manutenções e GPS
    if(nomeAntigo!==nome){
      osList.forEach(o=>{if(o.tecnico===nomeAntigo)o.tecnico=nome;});saveOS();
      manutencoes.forEach(mn=>{if(mn.tecnico===nomeAntigo)mn.tecnico=nome;});saveManut();
      const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
      if(locs[nomeAntigo]){locs[nome]=locs[nomeAntigo];delete locs[nomeAntigo];localStorage.setItem('mappo_locations',JSON.stringify(locs));}
    }
    toast('Técnico atualizado','success');
  }else{
    if(tecnicos.some(x=>x.nome.toLowerCase()===nome.toLowerCase())){toast('Já existe técnico com esse nome','warn');return;}
    tecnicos.push({id:'tec_'+Date.now(),nome,senha,modulos:mods,ativo:true,criadoEm:new Date().toISOString()});
    toast('Técnico adicionado — já pode fazer login','success');
  }
  saveTecnicos();closeModal();renderView('config');
}

function removerTecnico(id){
  const t=tecnicos.find(x=>x.id===id);if(!t)return;
  const abertas=osList.filter(o=>o.tecnico===t.nome&&o.status!=='concluida').length;
  const msg=abertas?`${t.nome} tem ${abertas} OS em aberto. Remover mesmo assim? (Reatribua as OS depois)`:`Remover ${t.nome} da equipe? Ele perde o acesso na hora.`;
  if(!confirm(msg))return;
  tecnicos=tecnicos.filter(x=>x.id!==id);saveTecnicos();
  renderView('config');toast('Técnico removido');
}

function toggleModuloTec(id,mod,val){
  const t=tecnicos.find(x=>x.id===id);if(!t)return;
  if(!t.modulos)t.modulos={split:true,vrf:false};
  t.modulos[mod]=val;
  if(!t.modulos.split&&!t.modulos.vrf){t.modulos[mod]=true;toast('O técnico precisa de pelo menos um módulo','warn');renderView('config');return;}
  saveTecnicos();toast('Acesso de '+t.nome+' atualizado','success');
}

function diasAte(d){if(!d)return 999;const diff=new Date(d+'T00:00:00')-new Date(hoje()+'T00:00:00');return Math.round(diff/86400000);}
function getTecnicoLoc(t){const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');const l=locs[t];if(!l)return null;if(Date.now()-l.ts>300000)return null;return l;}

function concluirManut(id){

    toast('Próxima manutenção '+m.recorrencia.toLowerCase()+' criada','success');

  saveManut();closeModal();renderView(currentView);atualizarBadges();

  const dt=m.dataAgendada.replace(/-/g,'');

  const det=encodeURIComponent(`Manutenção ${m.recorrencia}. ${m.obs||''}\nTécnico: ${m.tecnico||'A definir'}\n— via MAPPO`);

/* ════════════════════════════════════════
   MAPA (Leaflet)
   ════════════════════════════════════════ */
function initMapa(){
  if(typeof L==='undefined'){loadLeaflet(()=>{if(typeof L!=='undefined')initMapa();});return;}
  const box=document.getElementById('mapaBox');if(!box)return;
  box.innerHTML='';
  mapaInstance=L.map('mapaBox').setView([-17.302,-48.283],11); // Pires do Rio, GO como centro
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mapaInstance);
  atualizarMarcadores();
  setTimeout(()=>mapaInstance.invalidateSize(),200);
}

function atualizarMarcadores(){
  if(!mapaInstance)return;
  const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
  const pontos=[];
  nomesTecnicos().forEach(t=>{
    const l=locs[t];
    if(l&&Date.now()-l.ts<300000){
      pontos.push([l.lat,l.lng]);
      const ico=L.divIcon({html:`<div style="background:var(--petrol);color:#fff;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff">👷 ${t.split(' ')[0]}</div>`,className:'',iconSize:[80,24]});
      if(mapaMarkers[t])mapaMarkers[t].setLatLng([l.lat,l.lng]);
      else mapaMarkers[t]=L.marker([l.lat,l.lng],{icon:ico}).addTo(mapaInstance);
      mapaMarkers[t].bindPopup(`<b>${t}</b><br>Atualizado: ${new Date(l.ts).toLocaleTimeString('pt-BR')}${l.acc?'<br>Precisão: ~'+l.acc+'m':''}`);
    }else if(mapaMarkers[t]){
      mapaInstance.removeLayer(mapaMarkers[t]);delete mapaMarkers[t];
    }
  });
  // enquadra a equipe automaticamente na primeira carga com dados
  if(pontos.length&&!mapaInstance._fezFit){
    mapaInstance.fitBounds(pontos,{padding:[60,60],maxZoom:15});
    mapaInstance._fezFit=true;
  }
}

function loadLeaflet(cb){
  if(typeof L!=='undefined')return cb&&cb();
  if(window._leafletLoading){
    // já está carregando: aguarda sem recorrer
    const iv=setInterval(()=>{if(typeof L!=='undefined'){clearInterval(iv);cb&&cb();}},150);
    setTimeout(()=>clearInterval(iv),12000);
    return;
  }
  window._leafletLoading=true;
  const css=document.createElement('link');css.id='leafletCSS';css.rel='stylesheet';css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(css);
  const js=document.createElement('script');js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  js.onload=()=>{window._leafletLoading=false;cb&&cb();};
  js.onerror=()=>{window._leafletLoading=false;toast('Não foi possível carregar o mapa. Verifique a internet.','warn');};
  document.head.appendChild(js);
}

  const em=minhas.filter(o=>o.status==='andamento');
  const rev=minhas.filter(o=>o.status==='revisao');
  const atr=minhas.filter(o=>o.status==='pendente'&&o.data<hoje());
  const pen=minhas.filter(o=>o.status==='pendente'&&o.data>=hoje());
  const con=minhas.filter(o=>o.status==='concluida');

  let secoes='';
  if(rev.length)secoes+=secTec('🟠 Precisa refazer',rev);
  if(em.length)secoes+=secTec('🔵 Em andamento',em);
  if(atr.length)secoes+=secTec('🔴 Atrasadas',atr);
  if(pen.length)secoes+=secTec('🟡 Pendentes',pen);
  if(con.length)secoes+=secTec('✅ Concluídas',con);

  return `
  <div class="page-head"><div><div class="page-title">Minhas ordens</div><div class="page-desc">${minhas.filter(o=>o.status!=='concluida').length} em aberto</div></div>
  <button class="btn btn-ghost btn-sm" onclick="toggleGPS()"><span id="gpsLabel">📍 Ativar GPS</span></button></div>
  ${minhas.length?secoes:emptyState('ordens','Nenhuma OS atribuída','O gestor vai criar e atribuir suas ordens.')}`;
}

function secTec(titulo,list){
  return `<div style="margin-bottom:8px"><div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);margin:16px 0 10px">${titulo}</div>
  <div class="os-grid">${list.map(o=>{

/* GPS técnico */
let gpsWatchId=null;
function toggleGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;updateGPSLabel();toast('GPS desativado');return;}
  if(!navigator.geolocation){toast('GPS não disponível neste aparelho','error');return;}
  toast('Obtendo sua localização...');
  // 1ª posição imediata (não espera o watch)
  navigator.geolocation.getCurrentPosition(
    pos=>{salvarPosicao(pos);toast('📍 Localização encontrada e compartilhada','success');},
    err=>msgErroGPS(err),
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
  // acompanhamento contínuo
  gpsWatchId=navigator.geolocation.watchPosition(
    pos=>salvarPosicao(pos),
    err=>{msgErroGPS(err);if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;updateGPSLabel();}},
    {enableHighAccuracy:true,maximumAge:15000,timeout:30000}
  );
  updateGPSLabel();
}
function salvarPosicao(pos){
  const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
  locs[session.nome]={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy||0),ts:Date.now()};
  localStorage.setItem('mappo_locations',JSON.stringify(locs));
}
function msgErroGPS(err){
  const msgs={
    1:'Permissão de localização negada. Libere o acesso nas configurações do navegador.',
    2:'Sinal de GPS indisponível. Tente em área aberta.',
    3:'O GPS demorou pra responder. Tente de novo.'
  };
  toast(msgs[err.code]||'Erro ao obter localização','error');
}
function updateGPSLabel(){const l=document.getElementById('gpsLabel');if(l)l.textContent=gpsWatchId!==null?'📍 GPS ativo':'📍 Ativar GPS';}

function toggleCheck(i){
  if(!execOS.checkinTime){toast('Faça o check-in primeiro','warn');return;}
  const st=['pending','ok','nok'];const cur=execOS.checklist[i].status;
  const next=st[(st.indexOf(cur)+1)%3];
  if(next==='pending')execOS.checklist[i].foto=null;
  execOS.checklist[i].status=next;
  if(next==='nok'&&execOS.checklist[i].critico)toast('Item crítico com problema!','warn');
  saveExecOS();renderChecklistExec();verificarConcluir();
}
function onCheckFoto(evt,i){
  const file=evt.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{execOS.checklist[i].foto=e.target.result;saveExecOS();renderChecklistExec();verificarConcluir();toast('Foto salva','success');};
  r.readAsDataURL(file);
}

function execCheckin(){
  if(!navigator.geolocation){
    if(!confirm('Este aparelho não tem GPS. Fazer check-in mesmo assim?'))return;
    finalizarCheckin(null);return;
  }
  toast('Obtendo sua localização para o check-in...');
  const btn=document.querySelector('button[onclick="execCheckin()"]');
  if(btn){btn.disabled=true;btn.style.opacity='.6';btn.innerHTML='📍 Localizando...';}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      salvarPosicao(pos);
      // ativar watch contínuo para o mapa acompanhar durante o serviço
      if(gpsWatchId===null){
        gpsWatchId=navigator.geolocation.watchPosition(p=>salvarPosicao(p),()=>{},{enableHighAccuracy:true,maximumAge:15000,timeout:30000});
        updateGPSLabel();
      }
      finalizarCheckin(pos);
    },
    err=>{
      if(btn){btn.disabled=false;btn.style.opacity='';btn.innerHTML='📍 Fazer Check-in';}
      const msgs={1:'Permissão de localização negada. Para fazer o check-in, libere o acesso ao GPS nas configurações.',2:'Sinal de GPS indisponível. Tente em área aberta.',3:'O GPS demorou a responder. Tente novamente.'};
      toast(msgs[err.code]||'Não foi possível obter a localização','error');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
}
function finalizarCheckin(pos){
  execOS.checkinTime=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(pos)execOS.checkinLocal={lat:pos.coords.latitude,lng:pos.coords.longitude};
  execOS.status='andamento';saveExecOS();renderExecucao();
  toast(pos?'✅ Check-in com localização confirmada':'Check-in registrado','success');
}

/* assinatura canvas */
let sigCtx=null,sigDraw=false,sigHas=false;
function initSigCanvas(){
  const cv=document.getElementById('sigCanvas');if(!cv)return;sigHas=false;
  const ctx=cv.getContext('2d');sigCtx=ctx;
  setTimeout(()=>{const r=cv.getBoundingClientRect();cv.width=r.width*devicePixelRatio;cv.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);ctx.strokeStyle='#1f272c';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';},80);
  const pos=e=>{const r=cv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
  cv.onmousedown=e=>{sigDraw=true;ctx.beginPath();const p=pos(e);ctx.moveTo(p.x,p.y);};
  cv.onmousemove=e=>{if(!sigDraw)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigHas=true;verificarConcluir();};
  cv.onmouseup=()=>sigDraw=false;
  cv.ontouchstart=e=>{e.preventDefault();sigDraw=true;ctx.beginPath();const p=pos(e);ctx.moveTo(p.x,p.y);};
  cv.ontouchmove=e=>{e.preventDefault();if(!sigDraw)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigHas=true;verificarConcluir();};
  cv.ontouchend=()=>sigDraw=false;
}
function limparSig(){const cv=document.getElementById('sigCanvas');if(cv&&sigCtx){sigCtx.clearRect(0,0,cv.width,cv.height);sigHas=false;verificarConcluir();}}

function verificarConcluir(){
  if(!execOS)return;const btn=document.getElementById('btnConcluir');if(!btn)return;
  const checkin=!!execOS.checkinTime;
  const equip=(execOS.equipamentos||[]).every(e=>e.fotoEvap&&e.fotoCond);
  const criticos=execOS.checklist.filter(c=>c.critico).every(c=>(c.status==='ok'||c.status==='nok')&&c.foto);
  const todasFotos=execOS.checklist.every(c=>c.status==='pending'||c.foto);
  btn.disabled=!(checkin&&equip&&criticos&&todasFotos&&sigHas);
}

function execConcluir(){
  execOS.assinatura=document.getElementById('sigCanvas').toDataURL();
  execOS.status='concluida';execOS.motivoRevisao=null;
  execOS.checkoutTime=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  execOS.concluidaEm=new Date().toISOString();
  saveExecOS();
  const c=execOS.cliente,tipo=execOS.tipo;
  toast('OS concluída com sucesso!','success');
  execOS=null;nav('ordens');
}

function saveExecOS(){const idx=osList.findIndex(o=>o.id===execOS.id);if(idx>=0)osList[idx]=execOS;saveOS();}
function voltarExec(){execOS=null;renderView('ordens');}

/* ════════════════════════════════════════
   NOTIFICAÇÕES DE MANUTENÇÃO
   ════════════════════════════════════════ */
function startNotifChecker(){
  checkManutencoes();
  setInterval(checkManutencoes,3600000); // 1h
  // sync entre abas/dispositivos
  setInterval(()=>{
    osList=JSON.parse(localStorage.getItem('mappo_os')||'[]');
    manutencoes=JSON.parse(localStorage.getItem('mappo_manut')||'[]');
    const tecs=JSON.parse(localStorage.getItem('mappo_tecnicos')||'null');
    if(tecs&&tecs.length)tecnicos=tecs;
    // se o gestor removeu o técnico logado, revoga o acesso
    if(session&&session.perfil==='tecnico'){
      const eu=getTecnico(session.nome);
      if(!eu||eu.ativo===false){
        toast('Seu acesso foi revogado pelo gestor','warn');
        localStorage.removeItem('mappo_session');
        setTimeout(()=>location.reload(),1600);
        return;
      }
      aplicarMenuTecnico(); // módulos podem ter mudado
    }
    if(currentView==='mapa')atualizarMarcadores();
    atualizarBadges();
  },5000);
}

function checkManutencoes(){
  if(session&&session.perfil!=='gestor')return;
  manutencoes.forEach(m=>{
    if(m.concluida||m.avisado)return;
    const dias=diasAte(m.dataAgendada);
    if(dias<=7&&dias>=0){
      m.avisado=true;saveManut();
      if(settings.notifPlataforma){
        toast(`🔔 Manutenção em ${dias}d: ${m.cliente}`,'warn');
        notificarNavegador(`Manutenção próxima — ${m.cliente}`,`${m.tipo} em ${dias} dias (${fmtDate(m.dataAgendada)})`);
      }
      // email/sms: preparados para integração externa
      if(settings.notifEmail&&settings.emailGestor)enviarEmailManut(m);
      if(settings.notifSMS&&settings.telGestor)enviarSMSManut(m);
    }
  });
}

function notificarNavegador(titulo,corpo){
  if(!('Notification'in window))return;
  if(Notification.permission==='granted')new Notification(titulo,{body:corpo,icon:'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23185266%22/%3E%3C/svg%3E'});
  else if(Notification.permission!=='denied')Notification.requestPermission().then(p=>{if(p==='granted')new Notification(titulo,{body:corpo});});
}

/* stubs prontos p/ integração externa (EmailJS / Twilio) */
function enviarEmailManut(m){console.log('[EMAIL preparado] Para:',settings.emailGestor,'Manutenção:',m.cliente,'— integrar EmailJS aqui');}
function enviarSMSManut(m){console.log('[SMS preparado] Para:',settings.telGestor,'Manutenção:',m.cliente,'— integrar Twilio aqui');}

/* ── BOOT ── */
fbBoot(); // conecta à nuvem, sincroniza e liga listeners em tempo real
if(session){entrarApp();}
else{onPerfilChange();}
updateDate();
if('Notification'in window&&Notification.permission==='default'){/* pede permissão no primeiro login */}

/* splash de entrada */
window.addEventListener('load',()=>{
  setTimeout(()=>{
    const s=document.getElementById('splashScreen');
    if(s){s.classList.add('out');setTimeout(()=>s.remove(),600);}
  },4000);
});
</script>
