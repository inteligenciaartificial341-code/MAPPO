      <div class="os-card-top"><div><div class="os-client">${o.cliente}</div><div class="os-addr">🔧 ${o.tipo} · ❄️ ${o.qtdSplits||1} split${(o.qtdSplits||1)>1?'s':''}</div></div></div>
      ${o.notaGestor?`<div style="margin-top:8px;padding:8px 10px;background:var(--yellow-bg);border-radius:8px;font-size:12px;color:#92600e">📝 ${o.notaGestor}</div>`:''}
      ${o.status==='revisao'&&o.motivoRevisao?`<div style="margin-top:8px;padding:8px 10px;background:#fdf6e3;border-radius:8px;font-size:12px;color:var(--gold-dark)">↩ Revisar: ${o.motivoRevisao}</div>`:''}
      <div class="os-meta"><div class="os-meta-i"><span>📍</span>${o.endereco.substring(0,30)}</div><div class="os-meta-i"><span>📅</span>${fmtDate(o.data)}</div></div>
    </div>`;
  }).join('')}</div></div>`;
}

function afterTecnicoRender(){updateGPSLabel();}

/* GPS técnico */
let gpsWatchId=null;
function toggleGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;updateGPSLabel();toast('GPS desativado');return;}
  if(!navigator.geolocation){toast('GPS não disponível neste aparelho','error');return;}
  toast('Obtendo sua localização...');
  // 1ª posição imediata (não espera o watch)
  navigator.geolocation.getCurrentPosition(
    pos=>{salvarPosicao(pos);toast('📍 Localização encontrada e compartilhada','success');},
    err=>msgErroGPS(err),
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}
  );
  // acompanhamento contínuo
  gpsWatchId=navigator.geolocation.watchPosition(
    pos=>salvarPosicao(pos),
    err=>{msgErroGPS(err);if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;updateGPSLabel();}},
    {enableHighAccuracy:true,maximumAge:15000,timeout:30000}
  );
  updateGPSLabel();
}
function salvarPosicao(pos){
  const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
  locs[session.nome]={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:Math.round(pos.coords.accuracy||0),ts:Date.now()};
  localStorage.setItem('mappo_locations',JSON.stringify(locs));
}
function msgErroGPS(err){
  const msgs={
    1:'Permissão de localização negada. Libere o acesso nas configurações do navegador.',
    2:'Sinal de GPS indisponível. Tente em área aberta.',
    3:'O GPS demorou pra responder. Tente de novo.'
  };
  toast(msgs[err.code]||'Erro ao obter localização','error');
}
function updateGPSLabel(){const l=document.getElementById('gpsLabel');if(l)l.textContent=gpsWatchId!==null?'📍 GPS ativo':'📍 Ativar GPS';}

/* EXECUÇÃO DA OS (técnico) */
let execOS=null;
function abrirExecucao(id){
  execOS=osList.find(o=>o.id===id);if(!execOS)return;
  if(execOS.status==='revisao'){execOS.status='andamento';saveOS();}
  if(!execOS.checklist||!execOS.checklist.length)execOS.checklist=CHECKLIST_BASE.map(c=>({...c,status:'pending',foto:null}));
  if(!execOS.equipamentos||!execOS.equipamentos.length)execOS.equipamentos=Array.from({length:execOS.qtdSplits||1},(_,i)=>({idx:i,marca:'',modelo:'',fotoEvap:null,fotoCond:null}));
  renderExecucao();
}

function renderExecucao(){
  const os=execOS;
  const equipTabs=os.equipamentos.map((e,i)=>{const done=e.fotoEvap&&e.fotoCond;return `<button class="fbtn ${done?'active':''}" onclick="switchEquipTab(${i})" id="etab${i}">${done?'✅':''} Split ${i+1}</button>`}).join('');
  const c=document.getElementById('contentArea');
  c.innerHTML=`
    <button class="btn btn-ghost btn-sm" style="margin-bottom:16px" onclick="voltarExec()">${svgIco('back','ico-sm')} Voltar</button>
    <div class="page-head"><div><div class="page-title">${os.cliente}</div><div class="page-desc">📍 ${os.endereco} · ❄️ ${os.qtdSplits||1} split${(os.qtdSplits||1)>1?'s':''}</div></div></div>

    <!-- 1 CHECK-IN -->
    <div class="card" style="margin-bottom:16px"><div class="card-pad">
      <h3 style="font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:18px;margin-bottom:4px">1. Chegada no local</h3>
      <p style="font-size:13px;color:var(--gray-400);margin-bottom:14px">Registre o check-in para iniciar</p>
      ${os.checkinTime?`<div style="display:flex;align-items:center;gap:10px;color:var(--green);font-weight:600">✅ Check-in às ${os.checkinTime}</div>`:`<button class="btn btn-primary" style="width:100%;padding:16px" onclick="execCheckin()">📍 Fazer Check-in</button>`}
    </div></div>

    <!-- 2 EQUIPAMENTOS -->
    <div class="card" style="margin-bottom:16px"><div class="card-pad">
      <h3 style="font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:18px;margin-bottom:4px">2. Equipamentos</h3>
      <p style="font-size:13px;color:var(--gray-400);margin-bottom:14px">Marca, modelo e foto das etiquetas de cada split</p>
      <div class="filters" style="margin-bottom:16px">${equipTabs}</div>
      <div id="equipPanelArea"></div>
    </div></div>

    <!-- 3 CHECKLIST -->
    <div class="card" style="margin-bottom:16px"><div class="card-pad">
      <h3 style="font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:18px;margin-bottom:4px">3. Checklist</h3>
      <p style="font-size:13px;color:var(--gray-400);margin-bottom:14px">Toque para marcar. Foto obrigatória em cada item.</p>
      <div id="checklistArea"></div>
    </div></div>

    <!-- 4 ASSINATURA -->
    <div class="card" style="margin-bottom:16px"><div class="card-pad">
      <h3 style="font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:18px;margin-bottom:4px">4. Assinatura do cliente</h3>
      <p style="font-size:13px;color:var(--gray-400);margin-bottom:14px">Peça para o cliente assinar</p>
      <canvas id="sigCanvas" style="width:100%;height:150px;border:2px solid var(--gray-200);border-radius:10px;touch-action:none;background:#fff"></canvas>
      <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="limparSig()">🗑 Limpar</button>
    </div></div>

    <button class="btn btn-gold" id="btnConcluir" style="width:100%;padding:18px;font-size:16px" onclick="execConcluir()" disabled>✓ Concluir OS</button>
    <div style="height:40px"></div>`;

  switchEquipTab(0);
  renderChecklistExec();
  initSigCanvas();
  verificarConcluir();
}

function switchEquipTab(i){
  const e=execOS.equipamentos[i];
  document.querySelectorAll('[id^="etab"]').forEach((t,idx)=>t.classList.toggle('active',idx===i&&!(execOS.equipamentos[idx].fotoEvap&&execOS.equipamentos[idx].fotoCond)));
  const area=document.getElementById('equipPanelArea');
  area.innerHTML=`
    <div class="fg"><label>Marca</label><input type="text" value="${e.marca||''}" oninput="updEquip(${i},'marca',this.value)" placeholder="LG, Daikin, Midea..."></div>
    <div class="fg"><label>Modelo</label><input type="text" value="${e.modelo||''}" oninput="updEquip(${i},'modelo',this.value)" placeholder="Modelo do aparelho"></div>
    <div class="fg"><label>📷 Etiqueta — Evaporadora</label>
      <button class="btn ${e.fotoEvap?'btn-gold':'btn-ghost'}" style="width:100%" onclick="document.getElementById('fEvap${i}').click()">${e.fotoEvap?'✅ Foto enviada — trocar':'📷 Tirar foto'}</button>
      <input type="file" id="fEvap${i}" accept="image/*" capture="environment" style="display:none" onchange="onEquipFoto(event,${i},'evap')">
      ${e.fotoEvap?`<img src="${e.fotoEvap}" style="width:100%;margin-top:8px;border-radius:8px;border:2px solid var(--green)">`:''}
    </div>
    <div class="fg"><label>📷 Etiqueta — Condensadora</label>
      <button class="btn ${e.fotoCond?'btn-gold':'btn-ghost'}" style="width:100%" onclick="document.getElementById('fCond${i}').click()">${e.fotoCond?'✅ Foto enviada — trocar':'📷 Tirar foto'}</button>
      <input type="file" id="fCond${i}" accept="image/*" capture="environment" style="display:none" onchange="onEquipFoto(event,${i},'cond')">
      ${e.fotoCond?`<img src="${e.fotoCond}" style="width:100%;margin-top:8px;border-radius:8px;border:2px solid var(--green)">`:''}
    </div>`;
}

function updEquip(i,f,v){execOS.equipamentos[i][f]=v;saveExecOS();}
function onEquipFoto(evt,i,tipo){
  const file=evt.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    if(tipo==='evap')execOS.equipamentos[i].fotoEvap=e.target.result;
    else execOS.equipamentos[i].fotoCond=e.target.result;
    saveExecOS();switchEquipTab(i);
    document.querySelectorAll('[id^="etab"]')[i].innerHTML=(execOS.equipamentos[i].fotoEvap&&execOS.equipamentos[i].fotoCond?'✅':'')+' Split '+(i+1);
    verificarConcluir();toast('Foto salva','success');
  };
  r.readAsDataURL(file);
}

function renderChecklistExec(){
  const area=document.getElementById('checklistArea');
  const done=execOS.checklist.filter(c=>c.foto).length;
  area.innerHTML=`
    <div style="background:var(--gray-200);border-radius:20px;height:6px;overflow:hidden;margin-bottom:6px"><div style="width:${Math.round(done/execOS.checklist.length*100)}%;height:100%;background:var(--petrol);border-radius:20px;transition:width .3s"></div></div>
    <div style="font-size:12px;color:var(--gray-400);text-align:right;margin-bottom:14px">${done}/${execOS.checklist.length} com foto</div>
    ${execOS.checklist.map((item,i)=>{
      const sc=item.status==='ok'?'var(--green)':item.status==='nok'?'var(--red)':'var(--gray-200)';
      const ico=item.status==='ok'?'✓':item.status==='nok'?'✕':'';
      const bg=item.status==='ok'?'var(--green-bg)':item.status==='nok'?'var(--red-bg)':'#fff';
      const showFoto=(item.status==='ok'||item.status==='nok');
      return `<div style="border:2px solid ${sc};border-radius:10px;margin-bottom:10px;overflow:hidden;background:${bg}">
        <div style="display:flex;align-items:center;gap:12px;padding:14px" onclick="toggleCheck(${i})">
          <div style="width:30px;height:30px;border-radius:8px;border:2.5px solid ${sc};background:${item.status==='pending'?'#fff':sc};color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${ico}</div>
          <div style="flex:1;font-size:14px;font-weight:500">${item.label}</div>
          ${item.critico?'<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:10px;font-weight:700">CRÍTICO</span>':''}
        </div>
        ${showFoto?`<div style="padding:0 14px 14px">
          <button class="btn ${item.foto?'btn-gold':'btn-ghost'} btn-sm" style="width:100%" onclick="document.getElementById('cf${i}').click()">${item.foto?'✅ Foto enviada — trocar':'📷 Foto obrigatória'}</button>
          <input type="file" id="cf${i}" accept="image/*" capture="environment" style="display:none" onchange="onCheckFoto(event,${i})">
          ${item.foto?`<img src="${item.foto}" style="width:100%;margin-top:8px;border-radius:8px;border:2px solid var(--green)">`:''}
        </div>`:''}
      </div>`;
    }).join('')}
    <p style="font-size:11px;color:var(--gray-400);text-align:center">1x → ✅ · 2x → ❌ · 3x → limpar</p>`;
}

function toggleCheck(i){
  if(!execOS.checkinTime){toast('Faça o check-in primeiro','warn');return;}
  const st=['pending','ok','nok'];const cur=execOS.checklist[i].status;
  const next=st[(st.indexOf(cur)+1)%3];
  if(next==='pending')execOS.checklist[i].foto=null;
  execOS.checklist[i].status=next;
  if(next==='nok'&&execOS.checklist[i].critico)toast('Item crítico com problema!','warn');
  saveExecOS();renderChecklistExec();verificarConcluir();
}
function onCheckFoto(evt,i){
  const file=evt.target.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>{execOS.checklist[i].foto=e.target.result;saveExecOS();renderChecklistExec();verificarConcluir();toast('Foto salva','success');};
  r.readAsDataURL(file);
}

function execCheckin(){
  execOS.checkinTime=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  execOS.status='andamento';saveExecOS();renderExecucao();toast('Check-in registrado','success');
}

/* assinatura canvas */
let sigCtx=null,sigDraw=false,sigHas=false;
function initSigCanvas(){
  const cv=document.getElementById('sigCanvas');if(!cv)return;sigHas=false;
  const ctx=cv.getContext('2d');sigCtx=ctx;
  setTimeout(()=>{const r=cv.getBoundingClientRect();cv.width=r.width*devicePixelRatio;cv.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);ctx.strokeStyle='#1f272c';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';},80);
  const pos=e=>{const r=cv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
  cv.onmousedown=e=>{sigDraw=true;ctx.beginPath();const p=pos(e);ctx.moveTo(p.x,p.y);};
  cv.onmousemove=e=>{if(!sigDraw)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigHas=true;verificarConcluir();};
  cv.onmouseup=()=>sigDraw=false;
  cv.ontouchstart=e=>{e.preventDefault();sigDraw=true;ctx.beginPath();const p=pos(e);ctx.moveTo(p.x,p.y);};
  cv.ontouchmove=e=>{e.preventDefault();if(!sigDraw)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();sigHas=true;verificarConcluir();};
  cv.ontouchend=()=>sigDraw=false;
}
function limparSig(){const cv=document.getElementById('sigCanvas');if(cv&&sigCtx){sigCtx.clearRect(0,0,cv.width,cv.height);sigHas=false;verificarConcluir();}}

function verificarConcluir(){
  if(!execOS)return;const btn=document.getElementById('btnConcluir');if(!btn)return;
  const checkin=!!execOS.checkinTime;
  const equip=(execOS.equipamentos||[]).every(e=>e.fotoEvap&&e.fotoCond);
  const criticos=execOS.checklist.filter(c=>c.critico).every(c=>(c.status==='ok'||c.status==='nok')&&c.foto);
  const todasFotos=execOS.checklist.every(c=>c.status==='pending'||c.foto);
  btn.disabled=!(checkin&&equip&&criticos&&todasFotos&&sigHas);
}

function execConcluir(){
  execOS.assinatura=document.getElementById('sigCanvas').toDataURL();
  execOS.status='concluida';execOS.motivoRevisao=null;
  execOS.checkoutTime=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  execOS.concluidaEm=new Date().toISOString();
  saveExecOS();
  const c=execOS.cliente,tipo=execOS.tipo;
  toast('OS concluída com sucesso!','success');
  execOS=null;nav('ordens');
}

function saveExecOS(){const idx=osList.findIndex(o=>o.id===execOS.id);if(idx>=0)osList[idx]=execOS;saveOS();}
function voltarExec(){execOS=null;renderView('ordens');}

/* manutenções do técnico (leitura) */
function renderManutTecnico(){
  const minhas=manutencoes.filter(mn=>!mn.concluida&&mn.tecnico===session.nome).sort((a,b)=>a.dataAgendada.localeCompare(b.dataAgendada));
  return `
  <div class="page-head"><div><div class="page-title">Minhas manutenções</div><div class="page-desc">${minhas.length?minhas.length+' agendada'+(minhas.length>1?'s':'')+' para você':'Nada agendado para você por enquanto'}</div></div></div>
  ${minhas.length?`<div class="os-grid">${minhas.map(mn=>{
    const dias=diasAte(mn.dataAgendada);
    const cor=dias<0?'var(--red)':dias<=7?'var(--red)':dias<=30?'var(--yellow)':'var(--petrol)';
    return `<div class="os-card" style="border-color:${cor}">
      <div class="os-card-top"><div><div class="os-client">${mn.cliente}</div><div class="os-addr">${svgIco('pin','ico-sm')} ${mn.endereco||'Endereço a definir'}</div></div>
      <span class="badge" style="background:${cor}22;color:${cor}">${dias<0?'Vencida':dias===0?'Hoje':'Em '+dias+'d'}</span></div>
      <div class="os-meta">
        <div class="os-meta-i">${svgIco('calendar','ico-sm')} ${fmtDate(mn.dataAgendada)}</div>
        <div class="os-meta-i">${svgIco('config','ico-sm')} ${mn.tipo||'Preventiva'}</div>
        ${mn.obs?`<div class="os-meta-i">${svgIco('edit','ico-sm')} ${mn.obs}</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`:emptyState('manutencoes','Nenhuma manutenção sua','Quando o gestor agendar uma manutenção pra você, ela aparece aqui.')}`;
}

/* ════════════════════════════════════════
   NOTIFICAÇÕES DE MANUTENÇÃO
   ════════════════════════════════════════ */
function startNotifChecker(){
  checkManutencoes();
  setInterval(checkManutencoes,3600000); // 1h
  // sync entre abas/dispositivos
  setInterval(()=>{
    osList=JSON.parse(localStorage.getItem('mappo_os')||'[]');
    manutencoes=JSON.parse(localStorage.getItem('mappo_manut')||'[]');
    const tecs=JSON.parse(localStorage.getItem('mappo_tecnicos')||'null');
    if(tecs&&tecs.length)tecnicos=tecs;
    // se o gestor removeu o técnico logado, revoga o acesso
    if(session&&session.perfil==='tecnico'){
      const eu=getTecnico(session.nome);
      if(!eu||eu.ativo===false){
        toast('Seu acesso foi revogado pelo gestor','warn');
        localStorage.removeItem('mappo_session');
        setTimeout(()=>location.reload(),1600);
        return;
      }
      aplicarMenuTecnico(); // módulos podem ter mudado
    }
    if(currentView==='mapa')atualizarMarcadores();
    atualizarBadges();
  },5000);
}

function checkManutencoes(){
  if(session&&session.perfil!=='gestor')return;
  manutencoes.forEach(m=>{
    if(m.concluida||m.avisado)return;
    const dias=diasAte(m.dataAgendada);
    if(dias<=7&&dias>=0){
      m.avisado=true;saveManut();
      if(settings.notifPlataforma){
        toast(`🔔 Manutenção em ${dias}d: ${m.cliente}`,'warn');
        notificarNavegador(`Manutenção próxima — ${m.cliente}`,`${m.tipo} em ${dias} dias (${fmtDate(m.dataAgendada)})`);
      }
      // email/sms: preparados para integração externa
      if(settings.notifEmail&&settings.emailGestor)enviarEmailManut(m);
      if(settings.notifSMS&&settings.telGestor)enviarSMSManut(m);
    }
  });
}

function notificarNavegador(titulo,corpo){
  if(!('Notification'in window))return;
  if(Notification.permission==='granted')new Notification(titulo,{body:corpo,icon:'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23185266%22/%3E%3C/svg%3E'});
  else if(Notification.permission!=='denied')Notification.requestPermission().then(p=>{if(p==='granted')new Notification(titulo,{body:corpo});});
}

/* stubs prontos p/ integração externa (EmailJS / Twilio) */
function enviarEmailManut(m){console.log('[EMAIL preparado] Para:',settings.emailGestor,'Manutenção:',m.cliente,'— integrar EmailJS aqui');}
function enviarSMSManut(m){console.log('[SMS preparado] Para:',settings.telGestor,'Manutenção:',m.cliente,'— integrar Twilio aqui');}

/* ── BOOT ── */
if(session){entrarApp();}
else{onPerfilChange();}
updateDate();
if('Notification'in window&&Notification.permission==='default'){/* pede permissão no primeiro login */}
</script>
