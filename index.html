3Ccircle%20cx%3D%27123%27%20cy%3D%2750%27%20r%3D%2723%27%20fill%3D%27white%27/%253E%253Ccircle%20cx%3D%27123%27%20cy%3D%2748%27%20r%3D%2710%27%20fill%3D%27%2523185266%27/%253E%253C/svg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image/svg%2Bxml%22%2C%22purpose%22%3A%22any%22%7D%5D%7D">
<title>MAPPO — Gestão de Equipes em Campo</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23185266'/%3E%3Cg fill='none' stroke='white' stroke-width='3'%3E%3Cpath d='M30 35 L42 30 L58 35 L70 30 L70 65 L58 70 L42 65 L30 70 Z'/%3E%3Cpath d='M42 30 L42 65 M58 35 L58 70'/%3E%3C/g%3E%3Ccircle cx='62' cy='28' r='10' fill='white'/%3E%3Ccircle cx='62' cy='27' r='4' fill='%23185266'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* MAPPO petróleo (extraído da logo) */
    --petrol:#185266;--petrol-dark:#0f3a49;--petrol-light:#2a7089;--petrol-bg:#eef5f7;
    /* Elite Ar ouro */
    --gold:#c9a84c;--gold-light:#e8c96a;--gold-dark:#a88a35;
    /* status */
    --red:#e53e3e;--red-bg:#fff5f5;--yellow:#d69e2e;--yellow-bg:#fffbeb;--green:#2f9e6b;--green-bg:#f0fdf7;--blue:#3182ce;--blue-bg:#ebf8ff;
    /* neutros light */
    --white:#ffffff;--off:#f7f9fa;--gray-50:#f9fafb;--gray-100:#f1f4f6;--gray-200:#e4e9ec;--gray-300:#d1d9dd;--gray-400:#9aa5ac;--gray-500:#6b7780;--gray-600:#4b555c;--gray-700:#333b41;--gray-800:#1f272c;
    --shadow-sm:0 1px 3px rgba(15,58,73,.07);--shadow:0 4px 16px rgba(15,58,73,.10);--shadow-lg:0 12px 40px rgba(15,58,73,.16);
    --radius:14px;--radius-sm:9px;--radius-lg:20px;
    --sidebar-w:248px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  body{font-family:'Outfit',sans-serif;background:var(--off);color:var(--gray-800);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:10px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ═══════════ LOGIN / SPLASH ═══════════ */
  #loginScreen{position:fixed;inset:0;z-index:1000;background:linear-gradient(165deg,var(--petrol) 0%,var(--petrol-dark) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;transition:opacity .5s,visibility .5s;}
  #loginScreen.hidden{opacity:0;visibility:hidden;}

  .splash-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:44px;animation:fadeUp .8s ease;}
  .splash-mark{width:96px;height:96px;margin-bottom:20px;}
  .splash-name{font-family:'Outfit',sans-serif;font-size:56px;font-weight:700;color:#fff;letter-spacing:6px;line-height:1;}
  .splash-tagline{font-size:12px;font-weight:400;color:rgba(255,255,255,.72);letter-spacing:4px;margin-top:10px;text-transform:uppercase;}

  .login-box{background:rgba(255,255,255,.07);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.14);border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:360px;animation:fadeUp .8s ease .15s both;}
  .login-box h2{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:24px;font-weight:600;color:#fff;margin-bottom:22px;text-align:center;}
  .login-field{margin-bottom:16px;}
  .login-field label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:7px;}
  .login-field input,.login-field select{width:100%;padding:13px 15px;border:1.5px solid rgba(255,255,255,.18);border-radius:var(--radius-sm);background:rgba(255,255,255,.09);color:#fff;font-size:15px;outline:none;transition:border-color .15s;}
  .login-field input::placeholder{color:rgba(255,255,255,.4);}
  .login-field input:focus,.login-field select:focus{border-color:var(--gold);}
  .login-field select option{color:#1f272c;}
  .btn-entrar{width:100%;padding:14px;margin-top:6px;background:var(--gold);color:var(--petrol-dark);border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;letter-spacing:.5px;transition:all .15s;}
  .btn-entrar:active{transform:scale(.98);}
  .btn-entrar:hover{background:var(--gold-light);}
  .login-hint{font-size:12px;color:rgba(255,255,255,.5);text-align:center;margin-top:16px;line-height:1.5;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

  /* ═══════════ APP SHELL ═══════════ */
  #app{display:none;min-height:100vh;}
  #app.active{display:flex;}

  /* SIDEBAR */
  .sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,var(--petrol) 0%,var(--petrol-dark) 100%);min-height:100vh;position:fixed;left:0;top:0;bottom:0;display:flex;flex-direction:column;z-index:90;transition:transform .28s ease;}
  .sidebar-header{padding:calc(24px + env(safe-area-inset-top,0px)) 22px 20px;border-bottom:1px solid rgba(255,255,255,.1);}
  .sidebar-logo{display:flex;align-items:center;gap:11px;}
  .sidebar-mark{width:38px;height:38px;flex-shrink:0;}
  .sidebar-brand{line-height:1;}
  .sidebar-brand .n{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px;}
  .sidebar-brand .t{font-size:8px;font-weight:400;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}

  .sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
  .nav-section-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:12px 12px 8px;}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 14px;border-radius:var(--radius-sm);color:rgba(255,255,255,.78);font-size:14.5px;font-weight:500;margin-bottom:3px;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
  .nav-item.active{background:rgba(201,168,76,.16);color:var(--gold-light);}
  .nav-item.active .nav-ico{color:var(--gold);}
  .nav-ico{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .nav-badge{margin-left:auto;background:var(--gold);color:var(--petrol-dark);font-size:11px;font-weight:700;padding:1px 8px;border-radius:20px;min-width:20px;text-align:center;}

  .sidebar-footer{padding:14px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(255,255,255,.1);}
  .sidebar-user{display:flex;align-items:center;gap:11px;padding:8px 10px;}
  .user-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--petrol-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .user-meta{flex:1;line-height:1.3;overflow:hidden;}
  .user-meta .un{font-size:13.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-meta .ur{font-size:11px;color:rgba(255,255,255,.55);}
  .btn-sair{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;padding:6px;transition:color .15s;}
  .btn-sair:hover{color:var(--red);}

  /* MAIN */
  .main{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;transition:margin-left .28s ease;}

  .topbar{height:calc(64px + env(safe-area-inset-top,0px));padding-top:env(safe-area-inset-top,0px);background:var(--white);border-bottom:1px solid var(--gray-200);display:flex;align-items:flex-end;padding-bottom:10px;justify-content:space-between;padding-left:28px;padding-right:28px;position:sticky;top:0;z-index:50;}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .btn-hamburger{display:none;background:none;border:none;font-size:22px;color:var(--petrol);padding:4px;}
  .topbar-title{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:23px;font-weight:600;color:var(--gray-800);}
  .topbar-sub{font-size:12px;color:var(--gray-400);margin-top:-2px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .topbar-date{font-size:13px;color:var(--gray-500);font-weight:400;}

  .view-toggle{display:flex;align-items:center;gap:5px;background:var(--gray-100);border-radius:20px;padding:4px;}
  .view-toggle button{border:none;background:none;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:500;color:var(--gray-500);display:flex;align-items:center;gap:5px;transition:all .15s;}
  .view-toggle button.active{background:var(--white);color:var(--petrol);box-shadow:var(--shadow-sm);}

  .content{flex:1;padding:28px;max-width:1280px;width:100%;margin:0 auto;}

  /* mobile-mode (forçado pelo toggle) */
  .main.mobile-view .content{max-width:460px;}
  .main.mobile-view .stats-grid{grid-template-columns:repeat(2,1fr)!important;}
  .main.mobile-view .os-grid{grid-template-columns:1fr!important;}
  .main.mobile-view .two-col{grid-template-columns:1fr!important;}

  /* VIEWS */
  .view{display:none;animation:viewIn .3s ease;}
  .view.active{display:block;}
  @keyframes viewIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* ═══════════ COMPONENTES ═══════════ */
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
  .page-title{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:30px;font-weight:600;color:var(--gray-800);line-height:1.1;}
  .page-desc{font-size:14px;color:var(--gray-500);margin-top:4px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;}
  .btn-primary{background:var(--petrol);color:#fff;}
  .btn-primary:hover{background:var(--petrol-dark);box-shadow:var(--shadow);}
  .btn-gold{background:var(--gold);color:var(--petrol-dark);}
  .btn-gold:hover{background:var(--gold-light);}
  .btn-ghost{background:transparent;color:var(--petrol);border:1.5px solid var(--gray-300);}
  .btn-ghost:hover{border-color:var(--petrol);background:var(--petrol-bg);}
  .btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid #fecaca;}
  .btn-danger:hover{background:#fee2e2;}
  .btn-sm{padding:8px 14px;font-size:13px;}
  .btn:active{transform:scale(.98);}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px;}
  .stat{background:var(--white);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);border-left:4px solid var(--gray-200);transition:transform .15s;}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .stat.s-total{border-color:var(--petrol);}
  .stat.s-pend{border-color:var(--yellow);}
  .stat.s-prog{border-color:var(--blue);}
  .stat.s-done{border-color:var(--green);}
  .stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);margin-bottom:8px;}
  .stat-num{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:40px;font-weight:700;line-height:1;color:var(--gray-800);}
  .stat.s-total .stat-num{color:var(--petrol);}.stat.s-pend .stat-num{color:var(--yellow);}.stat.s-prog .stat-num{color:var(--blue);}.stat.s-done .stat-num{color:var(--green);}

  .two-col{display:grid;grid-template-columns:1fr 340px;gap:22px;align-items:start;}

  .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;}
  .card-pad{padding:22px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--gray-100);}
  .card-head h3{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:19px;font-weight:600;color:var(--gray-800);}

  /* FILTERS */
  .filters{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .fbtn{padding:7px 15px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);transition:all .15s;}
  .fbtn.active,.fbtn:hover{border-color:var(--petrol);color:var(--petrol);background:var(--petrol-bg);}

  /* OS CARDS */
  .os-grid{display:flex;flex-direction:column;gap:12px;}
  .os-card{background:var(--white);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow-sm);border-left:4px solid var(--gray-200);transition:all .15s;cursor:pointer;}
  .os-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
  .os-card.st-pendente{border-color:var(--yellow);}
  .os-card.st-andamento{border-color:var(--blue);}
  .os-card.st-concluida{border-color:var(--green);}
  .os-card.st-atrasada{border-color:var(--red);}
  .os-card.st-revisao{border-color:var(--gold);}
  .os-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
  .os-client{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:19px;font-weight:600;color:var(--gray-800);margin-bottom:2px;}
  .os-addr{font-size:13px;color:var(--gray-400);display:flex;align-items:center;gap:5px;}
  .os-addr .ico,.os-meta-i .ico{color:var(--gray-400);stroke-width:2;}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .b-pendente{background:var(--yellow-bg);color:#92600e;}
  .b-andamento{background:var(--blue-bg);color:#2c5282;}
  .b-concluida{background:var(--green-bg);color:#22674a;}
  .b-atrasada{background:var(--red-bg);color:#9b2c2c;}
  .b-revisao{background:#fdf6e3;color:var(--gold-dark);}

  .os-meta{display:flex;gap:18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--gray-100);flex-wrap:wrap;}
  .os-meta-i{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-600);}

  /* ETAPAS mini-progress */
  .etapas{display:flex;gap:6px;margin-top:14px;}
  .etapa{flex:1;text-align:center;}
  .etapa-bar{height:5px;border-radius:10px;background:var(--gray-200);margin-bottom:5px;transition:background .3s;}
  .etapa.done .etapa-bar{background:var(--green);}
  .etapa.current .etapa-bar{background:var(--blue);}
  .etapa-lbl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:var(--gray-400);}
  .etapa.done .etapa-lbl{color:var(--green);}
  .etapa.current .etapa-lbl{color:var(--blue);}

  .empty{text-align:center;padding:64px 20px;color:var(--gray-400);}
  .empty .ico{font-size:52px;margin-bottom:14px;opacity:.7;}
  .empty p{font-size:15px;line-height:1.5;}

  /* TÉCNICOS sidebar */
  .tech-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100);}
  .tech-row:last-child{border-bottom:none;}
  .tech-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--petrol-light),var(--petrol));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0;}
  .tech-info{flex:1;}
  .tech-nm{font-size:14px;font-weight:600;color:var(--gray-800);}
  .tech-st{font-size:12px;color:var(--gray-400);margin-top:1px;}
  .tech-live{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
  .tech-off{width:8px;height:8px;border-radius:50%;background:var(--gray-300);}

  /* FORM */
  .fg{margin-bottom:16px;}
  .fg label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-500);margin-bottom:6px;}
  .fg input,.fg select,.fg textarea{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);font-size:14px;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .15s;}
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--petrol);background:var(--white);}
  .fg textarea{resize:vertical;min-height:76px;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(15,58,73,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateY(16px);transition:transform .2s;}
  .overlay.open .modal{transform:translateY(0);}
  .modal-head{padding:24px 26px 0;}
  .modal-head h2{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:24px;font-weight:600;color:var(--gray-800);display:flex;align-items:center;gap:10px;}
  .modal-body{padding:20px 26px;}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:18px 26px;border-top:1px solid var(--gray-100);position:sticky;bottom:0;background:var(--white);}

  /* TOAST */
  .toast{position:fixed;bottom:26px;right:26px;background:var(--petrol-dark);color:#fff;padding:14px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);z-index:999;transform:translateY(90px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:10px;max-width:360px;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.t-success{background:var(--green);}
  .toast.t-warn{background:var(--gold-dark);}
  .toast.t-error{background:var(--red);}

  /* LIGHTBOX */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;cursor:pointer;}
  .lightbox.open{opacity:1;pointer-events:all;}
  .lightbox img{max-width:92vw;max-height:92vh;border-radius:12px;}

  /* MAPA */
  #mapaBox{width:100%;height:520px;border-radius:var(--radius);overflow:hidden;background:var(--gray-100);}
  .leaflet-container{font-family:'Outfit',sans-serif;}

  /* PLACEHOLDER VRF */
  .vrf-placeholder{text-align:center;padding:80px 24px;}
  .vrf-placeholder .ico{font-size:64px;margin-bottom:20px;}
  .vrf-placeholder h2{font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:28px;color:var(--gray-800);margin-bottom:10px;}
  .vrf-placeholder p{font-size:15px;color:var(--gray-500);max-width:440px;margin:0 auto 8px;line-height:1.6;}

  /* SETTINGS list */
  .set-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--gray-100);}
  .set-row:last-child{border-bottom:none;}
  .set-info .st{font-size:15px;font-weight:600;color:var(--gray-800);}
  .set-info .sd{font-size:13px;color:var(--gray-400);margin-top:2px;}
  .switch{position:relative;width:48px;height:27px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--gray-300);border-radius:20px;transition:.2s;}
  .slider:before{content:'';position:absolute;width:21px;height:21px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:var(--shadow-sm);}
  .switch input:checked+.slider{background:var(--green);}
  .switch input:checked+.slider:before{transform:translateX(21px);}

  /* ═══════════ ÍCONES SVG (Feather-style, contorno) ═══════════ */
  .ico{width:20px;height:20px;flex-shrink:0;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:middle;}
  .ico-sm{width:16px;height:16px;}
  .ico-lg{width:24px;height:24px;}

  /* ═══════════ BARRA DE NAVEGAÇÃO — DESKTOP (rail vertical à esquerda) ═══════════ */
  .navbar{position:fixed;z-index:70;background:var(--white);display:flex;left:0;top:0;bottom:0;width:88px;flex-direction:column;align-items:center;padding:16px 0;gap:4px;border-right:1px solid var(--gray-200);box-shadow:2px 0 12px rgba(15,58,73,.04);}
  .navbar-logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(140deg,var(--petrol),var(--petrol-dark));display:flex;align-items:center;justify-content:center;margin-bottom:12px;flex-shrink:0;cursor:pointer;}
  .navbar-logo svg{width:27px;height:27px;stroke:#fff;}
  .navbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:72px;padding:11px 0;border:none;background:none;border-radius:14px;color:var(--gray-500);cursor:pointer;transition:background .15s,color .15s;position:relative;}
  .navbtn:hover{background:var(--petrol-bg);color:var(--petrol);}
  .navbtn.active{background:var(--petrol-bg);color:var(--petrol);}
  .navbtn.active::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:4px;height:24px;background:var(--petrol);border-radius:0 4px 4px 0;}
  .navbtn .ico{width:23px;height:23px;}
  .navbtn-lbl{font-size:10.5px;font-weight:600;letter-spacing:.2px;line-height:1;}
  .navbtn-badge{position:absolute;top:5px;right:14px;background:var(--gold);color:var(--petrol-dark);font-size:9px;font-weight:700;min-width:16px;height:16px;padding:0 4px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .navbar-spacer{flex:1;}
  .navbtn-menu{color:var(--petrol);}

  /* rail empurra conteúdo e sidebar de config */
  body.has-rail .main{margin-left:88px;}
  body.has-rail .sidebar{left:88px;}
  /* no desktop, o hamburger da topbar não é necessário (menu abre pelo logo do rail) */
  body.has-rail .btn-hamburger{display:none;}

  .fab{display:none;}

  /* ═══════════ BARRA DE NAVEGAÇÃO — MOBILE (inferior fixa) ═══════════ */
  @media(max-width:1024px){
    .navbar{left:0;right:0;bottom:0;top:auto;width:auto;height:calc(62px + env(safe-area-inset-bottom,0px));flex-direction:row;padding:0;padding-bottom:env(safe-area-inset-bottom,0px);gap:0;border-right:none;border-top:1px solid var(--gray-200);box-shadow:0 -2px 16px rgba(15,58,73,.10);align-items:stretch;}
    .navbar-logo,.navbar-spacer{display:none;}
    #navbarBtns{display:flex;flex:1;}
    .navbtn{flex:1;width:auto;min-width:0;padding:7px 2px;gap:3px;border-radius:0;}
    .navbtn.active{background:transparent;color:var(--petrol);}
    .navbtn.active::before{left:50%;top:0;bottom:auto;transform:translateX(-50%);width:28px;height:3px;border-radius:0 0 4px 4px;}
    .navbtn:hover{background:transparent;}
    .navbtn .ico{width:22px;height:22px;}
    .navbtn-lbl{font-size:10px;}
    .navbtn-badge{top:3px;right:calc(50% - 20px);}
    .navbtn-menu{flex:0 0 58px;border-left:1px solid var(--gray-100);}
    body.has-rail .main{margin-left:0;}
    body.has-rail .sidebar{left:0;}
    /* conteúdo não passa por trás da barra */
    .main{padding-bottom:calc(62px + env(safe-area-inset-bottom,0px));}
    /* FAB acima da barra, tamanho contido */
    .fab{display:flex;position:fixed;right:16px;bottom:calc(78px + env(safe-area-inset-bottom,0px));width:52px;height:52px;border-radius:50%;background:var(--gold);color:var(--petrol-dark);border:none;box-shadow:0 6px 18px rgba(201,168,76,.45);z-index:71;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
    .fab:active{transform:scale(.92);}
    .fab svg{width:24px;height:24px;stroke:var(--petrol-dark);stroke-width:2.5;}
  }

  /* ═══════════ MODO MOBILE FORÇADO (toggle no desktop) ═══════════ */
  body.force-mobile .navbar{left:0;right:0;bottom:0;top:auto;width:auto;height:calc(62px + env(safe-area-inset-bottom,0px));flex-direction:row;padding:0;padding-bottom:env(safe-area-inset-bottom,0px);gap:0;border-right:none;border-top:1px solid var(--gray-200);box-shadow:0 -2px 16px rgba(15,58,73,.10);align-items:stretch;}
  body.force-mobile .navbar-logo,body.force-mobile .navbar-spacer{display:none;}
  body.force-mobile #navbarBtns{display:flex;flex:1;}
  body.force-mobile .navbtn{flex:1;width:auto;min-width:0;padding:7px 2px;gap:3px;border-radius:0;}
  body.force-mobile .navbtn.active{background:transparent;}
  body.force-mobile .navbtn.active::before{left:50%;top:0;bottom:auto;transform:translateX(-50%);width:28px;height:3px;border-radius:0 0 4px 4px;}
  body.force-mobile .navbtn-menu{flex:0 0 58px;border-left:1px solid var(--gray-100);}
  body.force-mobile.has-rail .main{margin-left:0;padding-bottom:62px;}
  body.force-mobile.has-rail .sidebar{left:0;}
  body.force-mobile .fab{display:flex;position:fixed;right:16px;bottom:calc(78px + env(safe-area-inset-bottom,0px));width:52px;height:52px;border-radius:50%;background:var(--gold);color:var(--petrol-dark);border:none;box-shadow:0 6px 18px rgba(201,168,76,.45);z-index:71;align-items:center;justify-content:center;cursor:pointer;}
  body.force-mobile .fab svg{width:24px;height:24px;stroke:var(--petrol-dark);stroke-width:2.5;}

  /* toggle Desktop/Mobile some no mobile real (redundante) */
  @media(max-width:1024px){
    .view-toggle{display:none;}
  }


  /* cards de seleção de módulo (modal técnico) */
  .mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
  .mod-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px 12px;border:2px solid var(--gray-200);border-radius:14px;cursor:pointer;user-select:none;transition:all .15s;text-align:center;}
  .mod-card input{position:absolute;opacity:0;pointer-events:none;}
  .mod-card .mod-ico{color:var(--gray-400);transition:color .15s;}
  .mod-card .mod-ico .ico{width:26px;height:26px;}
  .mod-card .mod-name{font-size:13.5px;font-weight:600;color:var(--gray-600);line-height:1.2;}
  .mod-card .mod-tick{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;background:var(--gray-200);color:#fff;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;}
  .mod-card .mod-tick .ico{width:13px;height:13px;stroke-width:3;}
  .mod-card.on{border-color:var(--petrol);background:var(--petrol-bg);}
  .mod-card.on .mod-ico{color:var(--petrol);}
  .mod-card.on .mod-name{color:var(--petrol);}
  .mod-card.on .mod-tick{opacity:1;background:var(--petrol);}

  /* checklist expansível (gestor vê fotos do técnico) */
  .chk-item{background:var(--gray-50);border-radius:10px;margin-bottom:6px;overflow:hidden;}
  .chk-item.nok{background:var(--red-bg);}
  .chk-row{display:flex;align-items:center;gap:12px;padding:11px 12px;}
  .chk-cam{color:var(--petrol);display:flex;}
  .chk-arrow{color:var(--gray-400);display:flex;transform:rotate(-90deg);transition:transform .2s;}
  .chk-arrow.open{transform:rotate(90deg);}
  .chk-foto{max-height:0;overflow:hidden;transition:max-height .28s ease;padding:0 12px;}
  .chk-foto.open{max-height:520px;padding:0 12px 12px;}

  /* ═══════════ VRF — painel do gestor ═══════════ */
  .vrf-section-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-500);margin:6px 2px 10px;}
  .vrf-hero{background:linear-gradient(135deg,var(--petrol),var(--petrol-dark));color:#fff;}
  .vrf-hero .vrf-hero-top{display:flex;justify-content:space-between;align-items:center;}
  .vrf-hero-label{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.7);margin-bottom:6px;}
  .vrf-hero-pct{font-size:44px;font-weight:800;font-family:'Inter';letter-spacing:-.02em;line-height:1;}
  .vrf-hero-pct span{font-size:22px;opacity:.7;}
  .vrf-hero-ring{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .vrf-hero-ring-in{width:66px;height:66px;border-radius:50%;background:var(--petrol-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--gold);}
  .vrf-hero-ring-in small{font-size:9px;font-weight:500;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .vrf-hero-meta{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.15);font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:6px;}
  .vrf-hero-meta .ico{stroke:rgba(255,255,255,.85);}

  .vrf-floors{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .vrf-floor-card{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:16px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow-sm);}
  .vrf-floor-card:hover{border-color:var(--petrol-light);box-shadow:var(--shadow);transform:translateY(-2px);}
  .vrf-fc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .vrf-fc-name{font-size:15px;font-weight:600;color:var(--gray-800);}
  .vrf-fc-pct{font-size:20px;font-weight:800;font-family:'Inter';}
  .vrf-fc-meta{display:flex;justify-content:space-between;margin-top:10px;font-size:11.5px;color:var(--gray-400);}
  .vrf-fc-meta span{display:flex;align-items:center;gap:4px;}
  .vrf-fc-meta .ico{stroke:var(--gray-400);}

  .vrf-bar{height:7px;background:var(--gray-200);border-radius:99px;overflow:hidden;}
  .vrf-bar-fill{height:100%;border-radius:99px;transition:width .4s;}

  .vrf-rel-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--gray-100);}
  .vrf-rel-item:last-child{border-bottom:none;}
  .vrf-rel-data{font-size:13px;font-weight:700;color:var(--gold-dark);min-width:70px;}
  .vrf-rel-info{flex:1;font-size:13px;display:flex;flex-direction:column;}
  .vrf-rel-info span{font-size:12px;color:var(--gray-400);font-style:italic;}
  .vrf-rel-pct{font-size:14px;font-weight:700;}

  /* andar aberto (modal) */
  .modal-wide{max-width:640px;}
  .vrf-andar-prog{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .vrf-fase{margin-bottom:14px;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden;}
  .vrf-fase-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--gray-50);font-size:13px;font-weight:600;color:var(--gray-700);}
  .vrf-fase-pct{font-weight:800;font-size:13px;}
  .vrf-fase-etapas{padding:6px;}
  .vrf-etapa{border-radius:8px;margin-bottom:2px;overflow:hidden;}
  .vrf-etapa.done{background:var(--green-bg);}
  .vrf-etapa-row{display:flex;align-items:center;gap:10px;padding:9px 10px;cursor:pointer;}
  .vrf-etapa-chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--gray-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .15s;}
  .vrf-etapa.done .vrf-etapa-chk{background:var(--green);border-color:var(--green);}
  .vrf-etapa-lbl{flex:1;font-size:13px;color:var(--gray-700);}
  .vrf-etapa-fotos{font-size:11px;color:var(--petrol);display:flex;align-items:center;gap:3px;}
  .vrf-etapa-fotos .ico{stroke:var(--petrol);}
  .vrf-etapa-nota{padding:0 10px 8px 40px;font-size:12px;color:var(--gray-500);font-style:italic;display:flex;align-items:center;gap:5px;}
  .vrf-etapa-gallery{display:flex;gap:6px;padding:0 10px 10px 40px;flex-wrap:wrap;}
  .vrf-etapa-gallery img{width:56px;height:56px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--gray-200);}

  /* andares na config */
  .vrf-andar-row{display:flex;gap:8px;align-items:center;}
  .vrf-andar-row input{flex:1;}
  .vrf-andar-del{background:var(--red-bg);border:none;color:var(--red);width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .vrf-andar-del .ico{stroke:var(--red);}

  /* missão (modal) */
  .vrf-mfase{margin-bottom:12px;}
  .vrf-mfase-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--petrol);padding:6px 2px;border-bottom:1px solid var(--gray-200);margin-bottom:4px;}
  .vrf-mstep{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--gray-700);transition:background .15s;}
  .vrf-mstep:hover{background:var(--gray-50);}
  .vrf-mstep.on{background:var(--petrol-bg);}
  .vrf-mstep-chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--gray-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;}
  .vrf-mstep.on .vrf-mstep-chk{background:var(--petrol);border-color:var(--petrol);}

  /* ═══════════ VRF — checklist do prestador ═══════════ */
  .vrf-tec-bar{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
  .vrf-tec-bar-top{display:flex;justify-content:space-between;font-size:13px;color:var(--gray-500);margin-bottom:8px;}
  .vrf-tec-pct{font-weight:800;color:var(--gold-dark);font-size:15px;}

  .vrf-tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .vrf-tabs::-webkit-scrollbar{height:0;}
  .vrf-tab{flex-shrink:0;background:var(--white);border:1.5px solid var(--gray-200);border-radius:11px;padding:9px 14px;font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:74px;transition:all .15s;font-family:inherit;}
  .vrf-tab small{font-size:11px;font-weight:700;color:var(--gray-400);}
  .vrf-tab.on{background:var(--petrol);border-color:var(--petrol);color:#fff;}
  .vrf-tab.on small{color:var(--gold-light);}
  .vrf-tab .ico{stroke:currentColor;}

  /* fase */
  .vrf-phase{background:var(--white);border:1px solid var(--gray-200);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .vrf-ph{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--gray-50);border-bottom:1px solid var(--gray-100);}
  .vrf-ph-num{background:var(--petrol);color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;flex-shrink:0;}
  .vrf-ph-name{flex:1;font-size:13.5px;font-weight:600;color:var(--gray-700);}
  .vrf-ph-count{font-size:12px;font-weight:700;color:var(--gray-400);}
  .vrf-steps{list-style:none;padding:6px;}
  .vrf-step{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:9px;transition:background .15s;}
  .vrf-step.on{background:var(--green-bg);}
  .vrf-step.inmis{box-shadow:inset 3px 0 0 var(--gold);}
  .vrf-step-box{flex-shrink:0;cursor:pointer;padding-top:1px;}
  .vrf-step-ck{width:22px;height:22px;border-radius:6px;border:2px solid var(--gray-300);display:flex;align-items:center;justify-content:center;color:#fff;transition:all .15s;}
  .vrf-step.on .vrf-step-ck{background:var(--green);border-color:var(--green);}
  .vrf-step-body{flex:1;min-width:0;}
  .vrf-step-txt{font-size:13.5px;color:var(--gray-700);line-height:1.4;cursor:pointer;display:block;}
  .vrf-mdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-right:6px;vertical-align:middle;}
  .vrf-step-note{margin-top:6px;font-size:12px;color:var(--gray-500);font-style:italic;display:flex;align-items:center;gap:5px;background:var(--gray-50);padding:5px 9px;border-radius:7px;}
  .vrf-step-note .ico{stroke:var(--gray-400);flex-shrink:0;}
  .vrf-step-photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .vrf-step-photos img{width:56px;height:56px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--gray-200);}
  .vrf-step-acts{display:flex;gap:6px;flex-shrink:0;}
  .vrf-act{position:relative;width:36px;height:36px;border-radius:9px;border:1.5px solid var(--gray-200);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-500);}
  .vrf-act.has{border-color:var(--petrol);color:var(--petrol);background:var(--petrol-bg);}
  .vrf-act .ico{stroke:currentColor;}
  .vrf-act-badge{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

  /* painel expansível automático ao concluir */
  .vrf-step-expand{margin-top:10px;padding:11px;background:var(--petrol-bg);border-radius:9px;animation:vrfExpandIn .25s ease;}
  @keyframes vrfExpandIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .vrf-step-prompt{font-size:12.5px;color:var(--petrol);font-weight:500;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
  .vrf-step-prompt .ico{stroke:var(--petrol);}
  .vrf-step-ebtns{display:flex;gap:8px;}
  .vrf-ebtn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--gray-200);background:var(--white);font-size:12.5px;font-weight:600;color:var(--gray-600);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;}
  .vrf-ebtn .ico{stroke:currentColor;}

// progresso de um andar (0-100)
function vrfProgAndar(andarId){
  const p=vrfProgresso[andarId]||{};
  let feitas=0;
  VRF_FASES.forEach(f=>f.etapas.forEach((_,i)=>{if(p[f.id+'_'+i])feitas++;}));
  return Math.round((feitas/VRF_TOTAL_ETAPAS)*100);
}
function vrfProgGeral(){
  if(!vrfObra.andares.length)return 0;
  const soma=vrfObra.andares.reduce((a,an)=>a+vrfProgAndar(an.id),0);
  return Math.round(soma/vrfObra.andares.length);
}
function vrfProgFase(andarId,faseId){
  const p=vrfProgresso[andarId]||{};
  const fase=VRF_FASES.find(f=>f.id===faseId);if(!fase)return 0;
  let feitas=0;fase.etapas.forEach((_,i)=>{if(p[faseId+'_'+i])feitas++;});
  return Math.round((feitas/fase.etapas.length)*100);
}

function saveClientes(){localStorage.setItem('mappo_clientes',JSON.stringify(clientes));}
function saveManut(){localStorage.setItem('mappo_manut',JSON.stringify(manutencoes));}
function saveSettings(){localStorage.setItem('mappo_settings',JSON.stringify(settings));}
function saveSession(){localStorage.setItem('mappo_session',JSON.stringify(session));}

/* ── LOGIN ── */
function onPerfilChange(){
  const perfil=document.getElementById('loginPerfil').value;
  const isTec=perfil==='tecnico';
  document.getElementById('loginTecnicoWrap').style.display=isTec?'block':'none';
  document.getElementById('loginTecSenhaWrap').style.display=isTec?'block':'none';
  document.getElementById('loginUserWrap').style.display=isTec?'none':'block';
  document.getElementById('loginPassWrap').style.display=isTec?'none':'block';
  document.getElementById('loginHint').innerHTML=isTec?'Selecione seu nome e digite a senha que o gestor te passou.':'Use as credenciais de gestor.';
  if(isTec){
    const sel=document.getElementById('loginTecnico');
    sel.innerHTML='<option value="">Escolha...</option>'+nomesTecnicos().map(t=>`<option value="${t}">${t}</option>`).join('');
  }
}

function fazerLogin(){
  const perfil=document.getElementById('loginPerfil').value;
  if(perfil==='gestor'){
    const u=document.getElementById('loginUser').value.trim();
    const p=document.getElementById('loginPass').value.trim();
    if(u!==CFG.gestorUser||p!==CFG.gestorPass){toast('Usuário ou senha incorretos','error');return;}
    session={perfil:'gestor',nome:'Elite Ar',role:'Gestor'};
  }else{
    const t=document.getElementById('loginTecnico').value;
    if(!t){toast('Selecione seu nome','warn');return;}
    const tec=getTecnico(t);
    if(!tec||tec.ativo===false){toast('Técnico não encontrado. Fale com o gestor.','error');return;}
    const senha=document.getElementById('loginTecSenha').value;
    if(senha!==(tec.senha||'1234')){toast('Senha incorreta','error');return;}
    session={perfil:'tecnico',nome:t,tecId:tec.id,role:'Técnico de Campo'};
  }
  saveSession();
  entrarApp();
}

function entrarApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('active');
  document.body.classList.add('has-rail');
  // avatar + nome
  const iniciais=session.nome.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('userAvatar').textContent=iniciais;
  document.getElementById('userName').textContent=session.nome;
  document.getElementById('userRole').textContent=session.role;
  // injeta ícones da sidebar e topbar
  injetarIcones();
  // monta a barra de navegação principal conforme perfil/módulos
  montarNavbar();
  // técnico vê só os módulos que o gestor liberou
  if(session.perfil==='tecnico'){
    aplicarMenuTecnico();
    const tec=getTecnico(session.nome)||{modulos:{split:true,vrf:false}};
    const m=tec.modulos||{split:true,vrf:false};
    nav(m.split?'ordens':'vrf');
  }else{
    document.querySelectorAll('.nav-item').forEach(el=>el.style.display='');
    nav('dashboard');
  }
  updateDate();
  startNotifChecker();
}

/* injeta ícones SVG nos slots fixos (sidebar, topbar, footer) */
function injetarIcones(){
  const map={'navico-splits':'splits','navico-vrf':'vrf','navico-config':'config'};
  Object.entries(map).forEach(([id,name])=>{const el=document.getElementById(id);if(el)el.innerHTML=svgIco(name);});
  document.querySelectorAll('.nav-ico-slot').forEach(el=>{el.innerHTML=svgIco(el.dataset.ico);});
  const tgD=document.getElementById('tgDesktop'),tgM=document.getElementById('tgMobile');
  if(tgD)tgD.innerHTML=svgIco('desktop','ico-sm')+' Desktop';
  if(tgM)tgM.innerHTML=svgIco('mobile','ico-sm')+' Mobile';
  const bs=document.querySelector('.btn-sair');if(bs)bs.innerHTML=svgIco('power');
}

/* monta a barra de navegação (bottom mobile / rail desktop) */
function montarNavbar(){
  let items=NAV_ITEMS;
  if(session.perfil==='tecnico'){
    const tec=getTecnico(session.nome)||{modulos:{split:true,vrf:false}};
    const m=tec.modulos||{split:true,vrf:false};
    // técnico: ordens (se split) + manutenções dele + VRF (se liberado)
    items=[];
    if(m.split){items.push({view:'ordens',icon:'ordens',label:'Ordens'});}
    items.push({view:'manutencoes',icon:'manutencoes',label:'Manut.'});
    if(m.vrf){items.push({view:'vrf',icon:'vrf',label:'VRF'});}
    // FAB e criação de OS são do gestor; esconde
    document.getElementById('fabNovo').style.display='none';
  }
  const cont=document.getElementById('navbarBtns');
  cont.innerHTML=items.map(it=>`
    <button class="navbtn" data-nav="${it.view}" onclick="nav('${it.view}')">
      ${svgIco(it.icon)}
      <span class="navbtn-lbl">${it.label}</span>
      ${it.badge?`<span class="navbtn-badge" id="nb-${it.badge}" style="display:none">0</span>`:''}
    </button>`).join('');
}

function logout(){
  if(!confirm('Deseja sair do MAPPO?'))return;
  session=null;localStorage.removeItem('mappo_session');
  document.body.classList.remove('has-rail');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').classList.remove('hidden');
  const sen=document.getElementById('loginTecSenha');if(sen)sen.value='';
  onPerfilChange(); // recarrega a lista de técnicos atualizada
}

/* ── NAVEGAÇÃO ── */
const VIEW_META={
  dashboard:['Painel','Visão geral da operação'],
  ordens:['Ordens de Serviço','Gerencie e acompanhe os serviços'],
  mapa:['Mapa ao Vivo','Localização da equipe em tempo real'],
  manutencoes:['Manutenções','Agendamentos e recorrências'],
  clientes:['Clientes','Cadastro e histórico'],
  splits:['Sistema Split','Instalação e serviço de splits'],
  vrf:['Sistema VRF','Gestão de obras VRF'],
  config:['Configurações','Preferências do sistema'],
};

function nav(view){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===view));
  document.querySelectorAll('.navbtn[data-nav]').forEach(n=>n.classList.toggle('active',n.dataset.nav===view));
  const meta=VIEW_META[view]||['',''];
  document.getElementById('topTitle').textContent=meta[0];
  document.getElementById('topSub').textContent=meta[1];
  renderView(view);
  closeSidebar();
  window.scrollTo(0,0);
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('backdrop').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('show');}

/* ── VIEW / MOBILE TOGGLE ── */
function setView(mode){
  const main=document.getElementById('mainArea');
  main.classList.toggle('mobile-view',mode==='mobile');
  document.body.classList.toggle('force-mobile',mode==='mobile');
  document.getElementById('tgDesktop').classList.toggle('active',mode==='desktop');
  document.getElementById('tgMobile').classList.toggle('active',mode==='mobile');
  if(currentView==='mapa'&&mapaInstance)setTimeout(()=>mapaInstance.invalidateSize(),300);
}

/* ── UTILS ── */
function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' t-'+type:'');
  setTimeout(()=>t.classList.remove('show'),3200);
}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function fmtDateShort(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}`;}
function hoje(){return new Date().toISOString().split('T')[0];}
function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function toggleChkFoto(ci){
  const f=document.getElementById('chkFoto'+ci),a=document.getElementById('chkArrow'+ci);
  if(!f)return;
  f.classList.toggle('open');
  if(a)a.classList.toggle('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function updateDate(){document.getElementById('topDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});}
function statusReal(os){if(os.status==='pendente'&&os.data<hoje())return'atrasada';return os.status;}
function etapaAtual(os){
  if(!os.checkinTime)return'checkin';
  const equipOk=(os.equipamentos||[]).every(e=>e.fotoEvap&&e.fotoCond);
  if(!equipOk)return'equipamentos';
  const checkOk=(os.checklist||[]).filter(c=>c.critico).every(c=>c.foto);
  if(!checkOk)return'checklist';
  if(!os.assinatura)return'assinatura';
  return'done';
}

   RENDER DE VIEWS

/* menu do técnico conforme módulos liberados */
function aplicarMenuTecnico(){
  if(!session||session.perfil!=='tecnico')return;
  const tec=getTecnico(session.nome)||{modulos:{split:true,vrf:false}};
  const m=tec.modulos||{split:true,vrf:false};
  document.querySelectorAll('[data-view="dashboard"],[data-view="mapa"],[data-view="clientes"],[data-view="config"],[data-view="manutencoes"],[data-view="splits"]').forEach(el=>el.style.display='none');
  const vrfEl=document.querySelector('[data-view="vrf"]');if(vrfEl)vrfEl.style.display=m.vrf?'':'none';
  const ordEl=document.querySelector('[data-view="ordens"]');if(ordEl)ordEl.style.display=m.split?'':'none';
}

function renderView(v){
  const c=document.getElementById('contentArea');
  // destrói o mapa Leaflet ao sair da view do mapa (evita mapa "fantasma" sobreposto)
  if(v!=='mapa'&&mapaInstance){try{mapaInstance.remove();}catch(e){}mapaInstance=null;mapaMarkers={};}
  // técnico: app de campo (ordens) + VRF se liberado
  if(session.perfil==='tecnico'){
    if(v==='vrf'){c.innerHTML=renderVRF();setTimeout(vrfSetupCamera,50);return;}
    if(v==='manutencoes'){c.innerHTML=renderManutTecnico();return;}
    c.innerHTML=renderTecnicoApp();afterTecnicoRender();return;
  }
  switch(v){
    case'dashboard':c.innerHTML=renderDashboard();break;
    case'ordens':c.innerHTML=renderOrdens();break;
    case'mapa':c.innerHTML=renderMapa();setTimeout(initMapa,60);break;
    case'manutencoes':c.innerHTML=renderManutencoes();break;
    case'clientes':c.innerHTML=renderClientes();break;
    case'splits':c.innerHTML=renderSplits();break;
    case'vrf':c.innerHTML=renderVRF();break;
    case'config':c.innerHTML=renderConfig();break;
    default:c.innerHTML='';
  }
  atualizarBadges();
}

function atualizarBadges(){
  const ativas=osList.filter(o=>o.status!=='concluida').length;
  const bOS=document.getElementById('badgeOS');
  if(bOS){bOS.style.display=ativas?'inline-block':'none';bOS.textContent=ativas;}
  const proximas=manutencoes.filter(m=>!m.concluida&&diasAte(m.dataAgendada)<=7).length;
  const bM=document.getElementById('badgeManut');
  if(bM){bM.style.display=proximas?'inline-block':'none';bM.textContent=proximas;}
  // badges da navbar
  const nbOS=document.getElementById('nb-badgeOS');
  if(nbOS){nbOS.style.display=ativas?'flex':'none';nbOS.textContent=ativas;}
  const nbM=document.getElementById('nb-badgeManut');
  if(nbM){nbM.style.display=proximas?'flex':'none';nbM.textContent=proximas;}
}

/* ═══════════ DASHBOARD ═══════════ */
function renderDashboard(){
  const total=osList.length;
  const pend=osList.filter(o=>o.status==='pendente').length;
  const prog=osList.filter(o=>o.status==='andamento').length;
  const done=osList.filter(o=>o.status==='concluida').length;
  const atrasadas=osList.filter(o=>statusReal(o)==='atrasada');

  return `
  <div class="page-head">
    <div><div class="page-title">Bom trabalho, ${session.nome.split(' ')[0]}</div>
    <div class="page-desc">Aqui está o resumo da operação de hoje.</div></div>
    <button class="btn btn-primary" onclick="openModalOS()">${svgIco('plus','ico-sm')} Nova OS</button>
  </div>

  <div class="stats-grid">
    <div class="stat s-total"><div class="stat-label">Total de OS</div><div class="stat-num">${total}</div></div>
    <div class="stat s-pend"><div class="stat-label">Pendentes</div><div class="stat-num">${pend}</div></div>
    <div class="stat s-prog"><div class="stat-label">Em andamento</div><div class="stat-num">${prog}</div></div>
    <div class="stat s-done"><div class="stat-label">Concluídas</div><div class="stat-num">${done}</div></div>
  </div>

  <div class="two-col">
    <div>
      ${atrasadas.length?`<div class="card" style="margin-bottom:20px;border-left:4px solid var(--red)">
        <div class="card-head"><h3 style="color:var(--red)">🔴 Atenção — ${atrasadas.length} OS atrasada${atrasadas.length>1?'s':''}</h3></div>
        <div class="card-pad" style="padding-top:6px">
          ${atrasadas.slice(0,3).map(o=>`<div class="os-meta-i" style="padding:8px 0;cursor:pointer" onclick="openDetalhe('${o.id}')"><span>📍</span> <strong>${o.cliente}</strong> — ${o.tecnico} · venceu ${fmtDate(o.data)}</div>`).join('')}
        </div></div>`:''}

      <div class="card">
        <div class="card-head"><h3>Ordens recentes</h3><button class="btn btn-ghost btn-sm" onclick="nav('ordens')">Ver todas</button></div>
        <div class="card-pad">
          ${osList.length?`<div class="os-grid">${osList.slice(0,4).map(osCardHTML).join('')}</div>`:emptyState('ordens','Nenhuma OS ainda','Crie sua primeira ordem de serviço.')}
        </div>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-head"><h3>Equipe agora</h3></div>
        <div class="card-pad" style="padding-top:6px">${renderEquipeMini()}</div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Próximas manutenções</h3></div>
        <div class="card-pad" style="padding-top:6px">${renderManutMini()}</div>
      </div>
    </div>
  </div>`;
}

function renderEquipeMini(){
  return nomesTecnicos().map(t=>{
    const em=osList.find(o=>o.tecnico===t&&o.status==='andamento');
    const loc=getTecnicoLoc(t);
    return `<div class="tech-row">
      <div class="tech-av">${t.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
      <div class="tech-info"><div class="tech-nm">${t}</div><div class="tech-st">${em?'🔧 '+em.cliente:'Disponível'}</div></div>
      <div class="${loc?'tech-live':'tech-off'}" title="${loc?'Online':'Offline'}"></div>
    </div>`;
  }).join('');
}

function renderManutMini(){
  const prox=manutencoes.filter(m=>!m.concluida).sort((a,b)=>a.dataAgendada.localeCompare(b.dataAgendada)).slice(0,4);
  if(!prox.length)return `<p style="font-size:13px;color:var(--gray-400);padding:8px 0">Nenhuma manutenção agendada.</p>`;
  return prox.map(m=>{
    const dias=diasAte(m.dataAgendada);
    const cor=dias<=7?'var(--red)':dias<=30?'var(--yellow)':'var(--gray-400)';
    return `<div style="padding:10px 0;border-bottom:1px solid var(--gray-100)">
      <div style="font-size:14px;font-weight:600;color:var(--gray-800)">${m.cliente}</div>
      <div style="font-size:12px;color:${cor};margin-top:2px">${dias<0?'Vencida':dias===0?'Hoje':'Em '+dias+' dias'} · ${fmtDate(m.dataAgendada)}</div>
    </div>`;
  }).join('');
}

/* ═══════════ ORDENS ═══════════ */
function renderOrdens(){
  return `
  <div class="page-head">
    <div><div class="page-title">Ordens de Serviço</div><div class="page-desc">${osList.length} ordens no total</div></div>
    <button class="btn btn-primary" onclick="openModalOS()">${svgIco('plus','ico-sm')} Nova OS</button>
  </div>
  <div class="filters">
    ${['todas|Todas','pendente|🟡 Pendentes','andamento|🔵 Em andamento','revisao|🟠 Em revisão','concluida|🟢 Concluídas','atrasada|🔴 Atrasadas'].map(f=>{const[k,l]=f.split('|');return `<button class="fbtn ${currentFilter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`}).join('')}
  </div>
  <div class="os-grid" id="osGridContainer">${renderOSGrid()}</div>`;
}

function setFilter(f){currentFilter=f;const el=document.getElementById('osGridContainer');if(el)el.innerHTML=renderOSGrid();document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');}

function renderOSGrid(){
  let list=[...osList];
  if(currentFilter!=='todas')list=list.filter(o=>statusReal(o)===currentFilter);
  if(!list.length)return emptyState('ordens','Nenhuma OS neste filtro','Ajuste os filtros ou crie uma nova ordem.');
  list.sort((a,b)=>{
    const sa=statusReal(a),sb=statusReal(b);
    if(sa==='atrasada'&&sb!=='atrasada')return -1;
    if(sb==='atrasada'&&sa!=='atrasada')return 1;
    return a.data.localeCompare(b.data);
  });
  return list.map(osCardHTML).join('');
}

function osCardHTML(os){
  const s=statusReal(os);
  const lbl={pendente:'Pendente',andamento:'Em andamento',concluida:'Concluída',atrasada:'Atrasada',revisao:'Em revisão'};
  const splits=os.qtdSplits||1;
  const atual=etapaAtual(os);
  // etapas visuais
  const etapasHTML=(s==='andamento'||s==='revisao')?`<div class="etapas">${ETAPAS.map(e=>{
    const idx=ETAPAS.indexOf(e),curIdx=ETAPAS.indexOf(atual);
    const cls=atual==='done'||idx<curIdx?'done':idx===curIdx?'current':'';
    return `<div class="etapa ${cls}"><div class="etapa-bar"></div><div class="etapa-lbl">${ETAPA_LBL[e]}</div></div>`;
  }).join('')}</div>`:'';

  return `<div class="os-card st-${s}" onclick="openDetalhe('${os.id}')">
    <div class="os-card-top">
      <div><div class="os-client">${os.cliente}</div><div class="os-addr">${svgIco('pin','ico-sm')} ${os.endereco}</div></div>
      <span class="badge b-${s}"><span class="dot"></span>${lbl[s]}</span>
    </div>
    <div class="os-meta">
      <div class="os-meta-i">${svgIco('config','ico-sm')} ${os.tipo}</div>
      <div class="os-meta-i">${svgIco('user','ico-sm')} ${os.tecnico}</div>
      <div class="os-meta-i">${svgIco('calendar','ico-sm')} ${fmtDate(os.data)} ${os.hora||''}</div>
      <div class="os-meta-i">${svgIco('splits','ico-sm')} ${splits} split${splits>1?'s':''}</div>
    </div>
    ${etapasHTML}
  </div>`;
}

/* ═══════════ CLIENTES ═══════════ */
function renderClientes(){
  // agrega clientes das OS
  const mapC={};
  osList.forEach(o=>{
    if(!mapC[o.cliente])mapC[o.cliente]={nome:o.cliente,endereco:o.endereco,visitas:[]};
    mapC[o.cliente].visitas.push(o);
  });
  clientes.forEach(c=>{if(!mapC[c.nome])mapC[c.nome]={...c,visitas:[]};});
  const lista=Object.values(mapC);

  return `
  <div class="page-head">
    <div><div class="page-title">Clientes</div><div class="page-desc">${lista.length} clientes · histórico completo por local</div></div>
    <button class="btn btn-primary" onclick="openModalCliente()">${svgIco('plus','ico-sm')} Novo cliente</button>
  </div>
  ${lista.length?`<div class="os-grid">${lista.map(c=>{
    const total=c.visitas.length;
    const conc=c.visitas.filter(v=>v.status==='concluida').length;
    return `<div class="os-card" onclick="openHistoricoCliente('${c.nome.replace(/'/g,"\\'")}')">
      <div class="os-card-top">
        <div><div class="os-client">${c.nome}</div><div class="os-addr">📍 ${c.endereco||'Sem endereço'}</div></div>
        <span class="badge b-concluida">${total} visita${total!==1?'s':''}</span>
      </div>
      <div class="os-meta">
        <div class="os-meta-i"><span>✅</span>${conc} concluídas</div>
        <div class="os-meta-i"><span>🔄</span>${c.visitas.filter(v=>v.status!=='concluida').length} em aberto</div>
      </div>
    </div>`;
  }).join('')}</div>`:emptyState('clientes','Nenhum cliente ainda','Os clientes aparecem aqui conforme você cria ordens de serviço.')}`;
}

/* ═══════════ MANUTENÇÕES ═══════════ */
function renderManutencoes(){
  const ativas=manutencoes.filter(m=>!m.concluida).sort((a,b)=>a.dataAgendada.localeCompare(b.dataAgendada));
  const feitas=manutencoes.filter(m=>m.concluida);
  return `
  <div class="page-head">
    <div><div class="page-title">Manutenções programadas</div><div class="page-desc">Recorrências e agendamentos futuros</div></div>
    <button class="btn btn-primary" onclick="openModalManut()">${svgIco('plus','ico-sm')} Agendar manutenção</button>
  </div>
  ${ativas.length?`<div class="os-grid">${ativas.map(manutCardHTML).join('')}</div>`:emptyState('manutencoes','Nenhuma manutenção agendada','Agende manutenções preventivas e receba avisos antes do prazo.')}
  ${feitas.length?`<h3 style="font-family:'Inter',sans-serif;letter-spacing:-.02em;font-size:20px;margin:28px 0 14px;color:var(--gray-600)">Concluídas</h3><div class="os-grid" style="opacity:.7">${feitas.map(manutCardHTML).join('')}</div>`:''}`;
}

function manutCardHTML(m){
  const dias=diasAte(m.dataAgendada);
  const urgente=dias<=7&&!m.concluida;
  const cor=m.concluida?'var(--green)':dias<0?'var(--red)':dias<=7?'var(--red)':dias<=30?'var(--yellow)':'var(--petrol)';
  return `<div class="os-card" style="border-color:${cor}" onclick="openModalManutEdit('${m.id}')">
    <div class="os-card-top">
      <div><div class="os-client">${m.cliente}</div><div class="os-addr">📍 ${m.endereco||''}</div></div>
      <span class="badge" style="background:${cor}22;color:${cor}">${m.concluida?'✓ Feita':dias<0?'Vencida':dias===0?'Hoje':'Em '+dias+'d'}</span>
    </div>
    <div class="os-meta">
      <div class="os-meta-i"><span>📅</span>${fmtDate(m.dataAgendada)}</div>

// progresso da missão
function vrfMissaoProgresso(){
  let done=0;const total=vrfObra.missao.items.length;
  vrfObra.andares.forEach(an=>{
    const p=vrfProgresso[an.id]||{};
    vrfObra.missao.items.forEach(key=>{if(p[key])done++;});
  });
  // missão conta por andar? no original é global — mantemos simples: por primeiro andar
  return {done:Math.min(done,total),total};
}

function vrfSetTab(i){
  vrfFloorTab=i;
  const painel=document.getElementById('vrfPainel');
  if(i===0)painel.innerHTML=vrfRenderMissaoPainel();
  else painel.innerHTML=vrfRenderAndarPainel(vrfObra.andares[i-1]);
  document.querySelectorAll('#vrfTabs .vrf-tab').forEach((b,idx)=>b.classList.toggle('on',idx===i));
}

// painel da missão
function vrfRenderMissaoPainel(){
  if(!vrfObra.missao.items.length){
    return `<div class="card">${emptyState('check','Missão não definida','O gestor ainda não enviou a missão desta semana. Use as abas acima para acessar o checklist completo.')}</div>`;
  }
  const andar=vrfObra.andares[vrfObra.missao.andarIdx]||vrfObra.andares[0];
  const p=vrfProgresso[andar.id]||{};
  const mp=vrfMissaoProgresso();
  const pct=mp.total>0?Math.round(mp.done/mp.total*100):0;

  const steps=vrfObra.missao.items.map(key=>{
    const [fid,ei]=key.split('_');
    const fase=VRF_FASES.find(f=>f.id===fid);
    if(!fase)return'';
    const done=!!p[key];
    return `<div class="vrf-mis-step ${done?'done':''}" onclick="vrfToggleTec('${andar.id}','${key}',this)">
      <span class="vrf-mis-chk">${done?svgIco('check','ico-sm'):''}</span>
      <div><div class="vrf-mis-txt">${fase.etapas[+ei]}</div><div class="vrf-mis-fase">${fase.nome}</div></div>
    </div>`;
  }).join('');

  return `<div class="card vrf-mis-card">
    <div class="vrf-mis-hdr">
      <div class="vrf-mis-title">${svgIco('check','ico-sm')} Missão da Semana</div>
      <span class="vrf-mis-badge">Entrega: Sexta</span>
    </div>
    <p class="vrf-mis-desc">Tarefas prioritárias definidas pelo gestor. Marque conforme executar.</p>
    <div class="vrf-mis-stats">
      <span><strong>${mp.done}</strong>/${mp.total} concluídas</span>
      <div class="vrf-bar" style="flex:1"><div class="vrf-bar-fill" style="width:${pct}%;background:${vrfCorProg(pct)}"></div></div>
      <strong style="color:${vrfCorProg(pct)}">${pct}%</strong>
    </div>
    <div class="vrf-mis-steps">${steps}</div>
  </div>`;
}

// painel de um andar (fases + etapas com foto/nota automático)
function vrfRenderAndarPainel(andar){
  const p=vrfProgresso[andar.id]||{};
  const fotos=vrfFotos[andar.id]||{};
  const notas=vrfNotas[andar.id]||{};

  const fasesHTML=VRF_FASES.map((f,fi)=>{
    let feito=0;f.etapas.forEach((_,ei)=>{if(p[f.id+'_'+ei])feito++;});
    const etapasHTML=f.etapas.map((txt,ei)=>{
      const key=f.id+'_'+ei;
      const done=!!p[key];
      const isMis=vrfObra.missao.items.includes(key);
      const fs=fotos[key]||[];
      const nota=notas[key]||'';
      // painel expansível automático quando marcado
      let expandHTML='';
      if(done){
        expandHTML='<div class="vrf-step-expand">';
        if(fs.length===0 && !nota){
          expandHTML+=`<div class="vrf-step-prompt">${svgIco('camera','ico-sm')} Etapa concluída! Registre uma foto do que foi feito:</div>`;
        }
        expandHTML+='<div class="vrf-step-ebtns">';
        expandHTML+=`<button class="vrf-ebtn cam ${fs.length?'has':''}" onclick="vrfAbrirCamera('${andar.id}','${key}',event)">${svgIco('camera','ico-sm')} ${fs.length?('+'+fs.length+' foto'+(fs.length!==1?'s':'')):'Adicionar foto'}</button>`;
        expandHTML+=`<button class="vrf-ebtn note ${nota?'has':''}" onclick="vrfAbrirNota('${andar.id}','${key}',event)">${svgIco('edit','ico-sm')} ${nota?'Editar nota':'Nota'}</button>`;
        expandHTML+='</div></div>';
      }
      // ações compactas quando não marcado
      let actHTML='';
      if(!done){
        actHTML=`<div class="vrf-step-acts">
          <button class="vrf-act ${fs.length?'has':''}" onclick="vrfAbrirCamera('${andar.id}','${key}',event)">${svgIco('camera','ico-sm')}${fs.length?`<span class="vrf-act-badge">${fs.length}</span>`:''}</button>
          <button class="vrf-act ${nota?'has':''}" onclick="vrfAbrirNota('${andar.id}','${key}',event)">${svgIco('edit','ico-sm')}</button>
        </div>`;
      }
      return `<li class="vrf-step ${done?'on':''} ${isMis?'inmis':''}">
        <div class="vrf-step-box" onclick="vrfToggleTec('${andar.id}','${key}',this.closest('.vrf-step'))"><span class="vrf-step-ck">${done?svgIco('check','ico-sm'):''}</span></div>
        <div class="vrf-step-body">
          <span class="vrf-step-txt" onclick="vrfToggleTec('${andar.id}','${key}',this.closest('.vrf-step'))">${isMis?'<span class="vrf-mdot"></span>':''}${txt}</span>
          ${nota?`<div class="vrf-step-note">${svgIco('edit','ico-sm')} ${nota.replace(/</g,'&lt;')}</div>`:''}
          ${fs.length?`<div class="vrf-step-photos">${fs.map((src,idx)=>`<img src="${src}" onclick="vrfVerFoto('${andar.id}','${key}',${idx},event)">`).join('')}</div>`:''}
          ${expandHTML}
        </div>
        ${actHTML}
      </li>`;
    }).join('');
    return `<div class="vrf-phase">
      <div class="vrf-ph"><span class="vrf-ph-num">F${fi+1}</span><span class="vrf-ph-name">${f.nome}</span><span class="vrf-ph-count">${feito}/${f.etapas.length}</span></div>
      <ul class="vrf-steps">${etapasHTML}</ul>
    </div>`;
  }).join('');
  return fasesHTML;
}

// toggle no lado do técnico — re-renderiza só o painel ativo (mantém a aba)
function vrfToggleTec(andarId,key,el){
  if(!vrfProgresso[andarId])vrfProgresso[andarId]={};
  const now=!vrfProgresso[andarId][key];
  if(now)vrfProgresso[andarId][key]=true;else delete vrfProgresso[andarId][key];
  saveVrfProgresso();
  // re-render do painel do andar para abrir o expand automático
  const painel=document.getElementById('vrfPainel');
  if(vrfFloorTab===0)painel.innerHTML=vrfRenderMissaoPainel();
  else painel.innerHTML=vrfRenderAndarPainel(vrfObra.andares[vrfFloorTab-1]);
  // atualizar % da tab e barra geral
  vrfAtualizarTabs();
}
function vrfAtualizarTabs(){
  const tabs=document.querySelectorAll('#vrfTabs .vrf-tab');
  const mp=vrfMissaoProgresso();
  if(tabs[0])tabs[0].querySelector('small').textContent=vrfObra.missao.items.length?mp.done+'/'+mp.total:'—';
  vrfObra.andares.forEach((an,i)=>{if(tabs[i+1])tabs[i+1].querySelector('small').textContent=vrfProgAndar(an.id)+'%';});
  const geral=vrfProgGeral();
  const bar=document.querySelector('.vrf-tec-bar .vrf-bar-fill');
  const pctT=document.querySelector('.vrf-tec-pct');
  if(bar)bar.style.width=geral+'%';
  if(pctT)pctT.textContent=geral+'%';
}

// câmera com compressão
let _vrfFotoTarget=null;
function vrfAbrirCamera(andarId,key,ev){
  if(ev)ev.stopPropagation();
  _vrfFotoTarget={andarId,key};
  const inp=document.getElementById('vrfCameraInput');
  inp.value='';inp.click();
}
function vrfComprimirImagem(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxW=1024,scale=Math.min(1,maxW/img.width);
      canvas.width=img.width*scale;canvas.height=img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      cb(canvas.toDataURL('image/jpeg',0.6));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function vrfSetupCamera(){
  const inp=document.getElementById('vrfCameraInput');
  if(!inp||inp._wired)return;inp._wired=true;
  inp.addEventListener('change',function(){
    if(!this.files||!this.files[0]||!_vrfFotoTarget)return;
    vrfComprimirImagem(this.files[0],b64=>{
      const{andarId,key}=_vrfFotoTarget;
      if(!vrfFotos[andarId])vrfFotos[andarId]={};
      if(!vrfFotos[andarId][key])vrfFotos[andarId][key]=[];
      vrfFotos[andarId][key].push(b64);
      saveVrfFotos();
      const painel=document.getElementById('vrfPainel');
      if(vrfFloorTab>0)painel.innerHTML=vrfRenderAndarPainel(vrfObra.andares[vrfFloorTab-1]);
      toast('Foto adicionada');
    });
  });
}

function vrfVerFoto(andarId,key,idx,ev){
  if(ev)ev.stopPropagation();

    </div>`,'wide');

function vrfExcluirFoto(andarId,key,idx){
  const fs=(vrfFotos[andarId]||{})[key];

  closeModal();
  const painel=document.getElementById('vrfPainel');
  if(vrfFloorTab>0)painel.innerHTML=vrfRenderAndarPainel(vrfObra.andares[vrfFloorTab-1]);
  toast('Foto excluída');
}

      <div class="fg"><label>Data alvo de conclusão</label><input type="date" id="vrfMeta" value="${vrfObra.metaData}"></div>

function vrfAddAndar(){

  saveVrfObra();vrfConfigObra();
}
function vrfRemoverAndar(i){
  if(vrfObra.andares.length<=1){toast('A obra precisa de ao menos 1 andar','warn');return;}
  const an=vrfObra.andares[i];
  if(!confirm('Remover "'+an.nome+'"? As marcações e fotos desse andar serão apagadas.'))return;
  delete vrfProgresso[an.id];delete vrfFotos[an.id];delete vrfNotas[an.id];
  vrfObra.andares.splice(i,1);
  saveVrfObra();saveVrfProgresso();saveVrfFotos();saveVrfNotas();
  vrfConfigObra();
}
function vrfRenomearAndar(i,nome){if(vrfObra.andares[i]){vrfObra.andares[i].nome=nome.trim()||('Andar '+(i+1));saveVrfObra();}}

function vrfConfigMissao(){
  const tabs=vrfObra.andares.map((an,i)=>`<button class="fbtn ${i===vrfObra.missao.andarIdx?'active':''}" onclick="vrfMissaoTab(${i})">${an.nome}</button>`).join('');

function vrfMissaoTab(i){vrfObra.missao.andarIdx=i;

function vrfRenderMissaoSteps(){

  cont.innerHTML=VRF_FASES.map(f=>`
    <div class="vrf-mfase">
      <div class="vrf-mfase-head">${f.nome}</div>

        const key=f.id+'_'+i;
        const on=vrfObra.missao.items.includes(key);
        return `<label class="vrf-mstep ${on?'on':''}" onclick="vrfToggleMissao('${key}',this)">
          <span class="vrf-mstep-chk">${on?svgIco('check','ico-sm'):''}</span>

function vrfToggleMissao(key,el){

}
function vrfSalvarMissao(){saveVrfObra();closeModal();renderView('vrf');toast('Missão da semana definida');}

/* ─── abrir andar: ver fases, etapas, progresso, fotos ─── */
function vrfAbrirAndar(andarId){
  const an=vrfObra.andares.find(a=>a.id===andarId);if(!an)return;
  const p=vrfProgresso[andarId]||{};
  const fotos=vrfFotos[andarId]||{};
  const notas=vrfNotas[andarId]||{};
  const fasesHTML=VRF_FASES.map(f=>{
    const pctFase=vrfProgFase(andarId,f.id);
    const etapasHTML=f.etapas.map((et,i)=>{
      const key=f.id+'_'+i;
      const done=!!p[key];
      const fs=fotos[key]||[];
      const nota=notas[key]||'';
      return `<div class="vrf-etapa ${done?'done':''}">
        <div class="vrf-etapa-row" onclick="vrfToggleEtapa('${andarId}','${key}',this)">
          <span class="vrf-etapa-chk">${done?svgIco('check','ico-sm'):''}</span>
          <span class="vrf-etapa-lbl">${et}</span>
          ${fs.length?`<span class="vrf-etapa-fotos">${svgIco('camera','ico-sm')} ${fs.length}</span>`:''}
        </div>
        ${nota?`<div class="vrf-etapa-nota">${svgIco('edit','ico-sm')} ${nota}</div>`:''}
        ${fs.length?`<div class="vrf-etapa-gallery">${fs.map(src=>`<img src="${src}" onclick="openLightbox('${src}')">`).join('')}</div>`:''}
      </div>`;
    }).join('');
    return `<div class="vrf-fase">
      <div class="vrf-fase-head">
        <span>${f.nome}</span>
        <span class="vrf-fase-pct" style="color:${vrfCorProg(pctFase)}">${pctFase}%</span>
      </div>
      <div class="vrf-fase-etapas">${etapasHTML}</div>
    </div>`;
  }).join('');
  const pct=vrfProgAndar(andarId);
  showModal(`
    <div class="modal-head"><h2>${an.nome}</h2></div>
    <div class="modal-body">
      <div class="vrf-andar-prog">
        <div class="vrf-bar" style="flex:1"><div class="vrf-bar-fill" style="width:${pct}%;background:${vrfCorProg(pct)}"></div></div>
        <span style="font-weight:700;color:${vrfCorProg(pct)}">${pct}%</span>
      </div>
      ${fasesHTML}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn btn-gold" onclick="vrfExportarPDF('${andarId}')">${svgIco('ordens','ico-sm')} Exportar PDF</button>
    </div>`,'wide');
}
function vrfToggleEtapa(andarId,key,el){
  if(!vrfProgresso[andarId])vrfProgresso[andarId]={};
  const now=!vrfProgresso[andarId][key];
  vrfProgresso[andarId][key]=now;
  if(!now)delete vrfProgresso[andarId][key];
  saveVrfProgresso();
  const item=el.closest('.vrf-etapa');
  item.classList.toggle('done',now);
  el.querySelector('.vrf-etapa-chk').innerHTML=now?svgIco('check','ico-sm'):'';
}
function vrfExportarPDF(andarId){
  toast('Geração de PDF será ativada em breve','warn');
}

function openModalTecnico(id){
  const t=id?tecnicos.find(x=>x.id===id):null;
  const m=t?(t.modulos||{split:true,vrf:false}):{split:true,vrf:false};
  showModal(`
    <div class="modal-head"><h2>${t?'✏️ Editar técnico':'👷 Novo técnico'}</h2></div>
    <div class="modal-body">
      <div class="fg"><label>Nome completo</label><input type="text" id="tNome" value="${t?t.nome:''}" placeholder="Nome do técnico"></div>
      <div class="fg"><label>Senha de acesso</label><input type="text" id="tSenha" value="${t?(t.senha||'1234'):''}" placeholder="Senha que ele usa no login">
      <p style="font-size:12px;color:var(--gray-400);margin-top:5px">Passe essa senha pro técnico. Só ele acessa a própria conta.</p></div>
      <div class="fg"><label>Módulos liberados</label>
        <div class="mod-grid">
          <label class="mod-card" id="modCardSplit">
            <input type="checkbox" id="tSplit" ${m.split?'checked':''} onchange="document.getElementById('modCardSplit').classList.toggle('on',this.checked)">
            <span class="mod-ico">${svgIco('splits')}</span>
            <span class="mod-name">Sistema Split</span>
            <span class="mod-tick">${svgIco('check','ico-sm')}</span>
          </label>
          <label class="mod-card" id="modCardVrf">
            <input type="checkbox" id="tVrf" ${m.vrf?'checked':''} onchange="document.getElementById('modCardVrf').classList.toggle('on',this.checked)">
            <span class="mod-ico">${svgIco('vrf')}</span>
            <span class="mod-name">Sistema VRF</span>
            <span class="mod-tick">${svgIco('check','ico-sm')}</span>
          </label>
        </div>
        <p style="font-size:12px;color:var(--gray-400);margin-top:8px">No login, o técnico só vê os módulos marcados aqui.</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarTecnico(${t?`'${t.id}'`:'null'})">${svgIco('check','ico-sm')} Salvar</button>
    </div>`);
  // estado visual inicial dos cards de módulo
  if(m.split)document.getElementById('modCardSplit').classList.add('on');
  if(m.vrf)document.getElementById('modCardVrf').classList.add('on');
}

function salvarTecnico(id){
  const nome=document.getElementById('tNome').value.trim();
  const senha=document.getElementById('tSenha').value.trim();
  const mods={split:document.getElementById('tSplit').checked,vrf:document.getElementById('tVrf').checked};
  if(!nome){toast('Informe o nome','warn');return;}
  if(!senha){toast('Defina uma senha','warn');return;}
  if(!mods.split&&!mods.vrf){toast('Libere pelo menos um módulo','warn');return;}
  if(id){
    const t=tecnicos.find(x=>x.id===id);if(!t)return;
    if(tecnicos.some(x=>x.id!==id&&x.nome.toLowerCase()===nome.toLowerCase())){toast('Já existe técnico com esse nome','warn');return;}
    const nomeAntigo=t.nome;
    t.nome=nome;t.senha=senha;t.modulos=mods;
    // renomeia em OS, manutenções e GPS
    if(nomeAntigo!==nome){
      osList.forEach(o=>{if(o.tecnico===nomeAntigo)o.tecnico=nome;});saveOS();
      manutencoes.forEach(mn=>{if(mn.tecnico===nomeAntigo)mn.tecnico=nome;});saveManut();
      const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
      if(locs[nomeAntigo]){locs[nome]=locs[nomeAntigo];delete locs[nomeAntigo];localStorage.setItem('mappo_locations',JSON.stringify(locs));}
    }
    toast('Técnico atualizado','success');
  }else{
    if(tecnicos.some(x=>x.nome.toLowerCase()===nome.toLowerCase())){toast('Já existe técnico com esse nome','warn');return;}
    tecnicos.push({id:'tec_'+Date.now(),nome,senha,modulos:mods,ativo:true,criadoEm:new Date().toISOString()});
    toast('Técnico adicionado — já pode fazer login','success');
  }
  saveTecnicos();closeModal();renderView('config');
}

function removerTecnico(id){
  const t=tecnicos.find(x=>x.id===id);if(!t)return;
  const abertas=osList.filter(o=>o.tecnico===t.nome&&o.status!=='concluida').length;
  const msg=abertas?`${t.nome} tem ${abertas} OS em aberto. Remover mesmo assim? (Reatribua as OS depois)`:`Remover ${t.nome} da equipe? Ele perde o acesso na hora.`;
  if(!confirm(msg))return;
  tecnicos=tecnicos.filter(x=>x.id!==id);saveTecnicos();
  renderView('config');toast('Técnico removido');
}

function toggleModuloTec(id,mod,val){
  const t=tecnicos.find(x=>x.id===id);if(!t)return;
  if(!t.modulos)t.modulos={split:true,vrf:false};
  t.modulos[mod]=val;
  if(!t.modulos.split&&!t.modulos.vrf){t.modulos[mod]=true;toast('O técnico precisa de pelo menos um módulo','warn');renderView('config');return;}
  saveTecnicos();toast('Acesso de '+t.nome+' atualizado','success');
}

/* ════════════════════════════════════════
   MAPA (Leaflet)
   ════════════════════════════════════════ */
function initMapa(){
  if(typeof L==='undefined'){loadLeaflet(()=>initMapa());return;}
  const box=document.getElementById('mapaBox');if(!box)return;
  box.innerHTML='';
  mapaInstance=L.map('mapaBox').setView([-17.302,-48.283],11); // Pires do Rio, GO como centro
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(mapaInstance);
  atualizarMarcadores();
  setTimeout(()=>mapaInstance.invalidateSize(),200);
}

function atualizarMarcadores(){
  if(!mapaInstance)return;
  const locs=JSON.parse(localStorage.getItem('mappo_locations')||'{}');
  const pontos=[];
  nomesTecnicos().forEach(t=>{
    const l=locs[t];
    if(l&&Date.now()-l.ts<300000){
      pontos.push([l.lat,l.lng]);
      const ico=L.divIcon({html:`<div style="background:var(--petrol);color:#fff;padding:4px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);border:2px solid #fff">👷 ${t.split(' ')[0]}</div>`,className:'',iconSize:[80,24]});
      if(mapaMarkers[t])mapaMarkers[t].setLatLng([l.lat,l.lng]);
      else mapaMarkers[t]=L.marker([l.lat,l.lng],{icon:ico}).addTo(mapaInstance);
      mapaMarkers[t].bindPopup(`<b>${t}</b><br>Atualizado: ${new Date(l.ts).toLocaleTimeString('pt-BR')}${l.acc?'<br>Precisão: ~'+l.acc+'m':''}`);
    }else if(mapaMarkers[t]){
      mapaInstance.removeLayer(mapaMarkers[t]);delete mapaMarkers[t];
    }
  });
  // enquadra a equipe automaticamente na primeira carga com dados
  if(pontos.length&&!mapaInstance._fezFit){
    mapaInstance.fitBounds(pontos,{padding:[60,60],maxZoom:15});
    mapaInstance._fezFit=true;
  }
}

function loadLeaflet(cb){
  if(document.getElementById('leafletCSS'))return cb&&cb();
  const css=document.createElement('link');css.id='leafletCSS';css.rel='stylesheet';css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(css);
  const js=document.createElement('script');js.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';js.onload=()=>cb&&cb();document.head.appendChild(js);
}

function renderTecnicoApp(){
  const minhas=osList.filter(o=>o.tecnico===session.nome);
  const em=minhas.filter(o=>o.status==='andamento');
  const rev=minhas.filter(o=>o.status==='revisao');
  const atr=minhas.filter(o=>o.status==='pendente'&&o.data<hoje());
  const pen=minhas.filter(o=>o.status==='pendente'&&o.data>=hoje());
  const con=minhas.filter(o=>o.status==='concluida');

  let secoes='';
  if(rev.length)secoes+=secTec('🟠 Precisa refazer',rev);
  if(em.length)secoes+=secTec('🔵 Em andamento',em);
  if(atr.length)secoes+=secTec('🔴 Atrasadas',atr);
  if(pen.length)secoes+=secTec('🟡 Pendentes',pen);
  if(con.length)secoes+=secTec('✅ Concluídas',con);

  return `
  <div class="page-head"><div><div class="page-title">Minhas ordens</div><div class="page-desc">${minhas.filter(o=>o.status!=='concluida').length} em aberto</div></div>
  <button class="btn btn-ghost btn-sm" onclick="toggleGPS()"><span id="gpsLabel">📍 Ativar GPS</span></button></div>
  ${minhas.length?secoes:emptyState('ordens','Nenhuma OS atribuída','O gestor vai criar e atribuir suas ordens.')}`;
}
